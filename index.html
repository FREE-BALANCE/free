<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NEXUS · Recharge Card Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ═══════════════════════════════════════════════════════════════════
           RESET & BASE
           ═══════════════════════════════════════════════════════════════════ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --radius-sm: 14px;
            --radius-md: 22px;
            --radius-lg: 32px;
            --radius-xl: 44px;
            --glass-bg: rgba(255, 255, 255, 0.035);
            --glass-border: rgba(255, 255, 255, 0.06);
            --text-primary: #f0f4ff;
            --text-secondary: rgba(255, 255, 255, 0.5);
            --text-tertiary: rgba(255, 255, 255, 0.2);
            --shadow-xl: 0 40px 100px rgba(0, 0, 0, 0.6);
            --transition: 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            --font: 'Cairo', 'Inter', -apple-system, sans-serif;
            --btn-color: #ffd700;
            --btn-glow: rgba(255, 215, 0, 0.15);
        }
        html,
        body {
            width: 100%;
            min-height: 100vh;
            background: #06080f;
            color: var(--text-primary);
            font-family: var(--font);
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }
        #app {
            position: fixed;
            inset: 0;
            background: #06080f;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ═══════════════════════════════════════════════════════════════════
           BACKGROUND LAYERS
           ═══════════════════════════════════════════════════════════════════ */
        .bg-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .bg-layer .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            animation: orbFloat 25s ease-in-out infinite alternate;
        }
        .bg-layer .orb:nth-child(1) {
            width: 500px;
            height: 500px;
            top: -15%;
            left: -10%;
            background: radial-gradient(circle, #ffd70033, transparent 70%);
            animation-duration: 28s;
        }
        .bg-layer .orb:nth-child(2) {
            width: 400px;
            height: 400px;
            bottom: -20%;
            right: -10%;
            background: radial-gradient(circle, #ff8c0033, transparent 70%);
            animation-duration: 32s;
            animation-delay: -8s;
        }
        .bg-layer .orb:nth-child(3) {
            width: 350px;
            height: 350px;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(circle, #ff450022, transparent 70%);
            animation-duration: 20s;
            animation-delay: -4s;
        }
        @keyframes orbFloat {
            0% {
                transform: translate(0, 0) scale(1);
            }
            100% {
                transform: translate(50px, -60px) scale(1.15);
            }
        }
        .bg-layer .grid-dots {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255, 215, 0, 0.025) 1px, transparent 1px);
            background-size: 48px 48px;
            animation: dotsDrift 35s linear infinite;
        }
        @keyframes dotsDrift {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(48px, 48px);
            }
        }

        /* ═══════════════════════════════════════════════════════════════════
           MAIN CONTAINER
           ═══════════════════════════════════════════════════════════════════ */
        .app-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 580px;
            padding: 14px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* ═══════════════════════════════════════════════════════════════════
           HEADER
           ═══════════════════════════════════════════════════════════════════ */
        .header {
            text-align: center;
            margin-bottom: 16px;
            padding: 0 6px;
        }
        .header .badge {
            display: inline-block;
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-tertiary);
            background: var(--glass-bg);
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            margin-bottom: 4px;
            font-weight: 500;
        }
        .header h1 {
            font-size: clamp(28px, 6.5vw, 42px);
            font-weight: 900;
            letter-spacing: -0.01em;
            background: linear-gradient(135deg, #ffd700 0%, #ff8c00 40%, #ff4500 80%, #ffd700 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 6s ease-in-out infinite alternate;
            line-height: 1.1;
        }
        @keyframes gradShift {
            0% {
                background-position: 0% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }
        .header p {
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 0.04em;
            margin-top: 2px;
        }

        /* ═══════════════════════════════════════════════════════════════════
           PANEL — Glass Core
           ═══════════════════════════════════════════════════════════════════ */
        .panel {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(1.3);
            -webkit-backdrop-filter: blur(40px) saturate(1.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 24px 20px;
            box-shadow: var(--shadow-xl), inset 0 1px 0 rgba(255, 255, 255, 0.02);
            flex: 0 1 auto;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.04), transparent 50%, rgba(255, 215, 0, 0.02));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
        .panel .glow-aura {
            position: absolute;
            top: -30%;
            right: -20%;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            pointer-events: none;
            transition: all 1.5s ease;
            opacity: 0.2;
            filter: blur(60px);
            background: radial-gradient(circle, #ffd70033, transparent 70%);
        }

        /* ═══════════════════════════════════════════════════════════════════
           PAGES
           ═══════════════════════════════════════════════════════════════════ */
        .page {
            display: none;
            flex-direction: column;
            flex: 1;
            animation: pageIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .page.active {
            display: flex;
        }
        @keyframes pageIn {
            0% {
                opacity: 0;
                transform: translateY(20px) scale(0.97);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .page .page-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: -0.01em;
        }
        .page .page-title .accent {
            color: var(--btn-color, #ffd700);
        }
        .page .page-sub {
            font-size: 12px;
            color: var(--text-tertiary);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 400;
            margin-bottom: 2px;
        }

        /* ─── Back Row ─── */
        .back-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .back-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            padding: 4px 12px;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: var(--font);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            transform: translateX(4px);
        }
        .back-btn svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .back-row .label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-right: auto;
            font-weight: 400;
        }

        /* ─── Grids ─── */
        .grid-2 {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        /* ─── Buttons ─── */
        .btn {
            border: 0;
            border-radius: var(--radius-sm);
            padding: 12px 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            font-family: var(--font);
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            min-height: 52px;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.3);
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn .icon {
            font-size: 24px;
            line-height: 1;
        }
        .btn .label {
            font-size: 13px;
            font-weight: 600;
        }
        .btn .sub {
            font-size: 9px;
            font-weight: 400;
            opacity: 0.35;
        }
        .btn .bar {
            position: absolute;
            bottom: 0;
            left: 25%;
            right: 25%;
            height: 2px;
            border-radius: 2px;
            background: var(--btn-color, #ffd700);
            opacity: 0;
            transition: all 0.4s ease;
        }
        .btn:hover .bar {
            opacity: 0.4;
            left: 10%;
            right: 10%;
        }
        .btn .dot-indicator {
            position: absolute;
            top: 8px;
            right: 10px;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--btn-color, #ffd700);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .btn:hover .dot-indicator {
            opacity: 0.6;
        }

        /* ─── Country Button ─── */
        .btn-country {
            min-height: 66px;
            padding: 10px 6px;
            background: rgba(255, 255, 255, 0.02);
        }
        .btn-country .icon {
            font-size: 28px;
        }
        .btn-country .label {
            font-size: 12px;
        }

        /* ─── Input ─── */
        .input-wrap {
            position: relative;
            margin: 6px 0 8px;
        }
        .input-wrap .prefix {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            direction: ltr;
        }
        .input-wrap input {
            width: 100%;
            padding: 14px 70px 14px 16px;
            border-radius: var(--radius-md);
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 17px;
            font-weight: 400;
            font-family: var(--font);
            outline: none;
            transition: all 0.4s ease;
            backdrop-filter: blur(8px);
            letter-spacing: 0.04em;
            direction: ltr;
            text-align: left;
        }
        .input-wrap input::placeholder {
            color: rgba(255, 255, 255, 0.1);
            font-weight: 300;
            font-size: 14px;
        }
        .input-wrap input:focus {
            border-color: var(--btn-color, #ffd700);
            box-shadow: 0 0 40px var(--btn-glow, rgba(255, 215, 0, 0.04));
            background: rgba(0, 0, 0, 0.4);
        }
        .input-wrap .glow-line {
            position: absolute;
            bottom: -2px;
            left: 50%;
            transform: translateX(-50%);
            width: 0%;
            height: 2px;
            border-radius: 2px;
            background: linear-gradient(90deg, transparent, var(--btn-color, #ffd700), transparent);
            transition: width 0.5s ease;
        }
        .input-wrap:focus-within .glow-line {
            width: 60%;
        }
        .input-wrap .status-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            opacity: 0;
            transition: all 0.4s ease;
        }
        .input-wrap .status-icon.valid {
            opacity: 1;
            color: #4ade80;
        }
        .input-wrap .status-icon.invalid {
            opacity: 1;
            color: #f87171;
        }
        .input-wrap .status-icon.idle {
            opacity: 0.3;
            color: var(--text-tertiary);
        }
        .validation-msg {
            font-size: 11px;
            font-weight: 400;
            min-height: 18px;
            padding-right: 4px;
            transition: all 0.3s ease;
            color: var(--text-secondary);
        }
        .validation-msg.valid {
            color: #4ade80;
        }
        .validation-msg.invalid {
            color: #f87171;
        }

        /* ─── Operator Badge ─── */
        .operator-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            margin: 6px 0 4px;
        }
        .operator-badge .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .operator-badge .name {
            font-size: 14px;
            font-weight: 600;
        }
        .operator-badge .sub {
            font-size: 11px;
            color: var(--text-secondary);
            margin-right: auto;
        }

        /* ─── Primary Action ─── */
        .btn-primary {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            border: 0;
            font-size: 16px;
            font-weight: 700;
            font-family: var(--font);
            color: #1a0a0a;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(255, 215, 0, 0.2);
            position: relative;
            overflow: hidden;
            margin-top: 4px;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 8px 50px rgba(255, 215, 0, 0.35);
        }
        .btn-primary:active:not(:disabled) {
            transform: scale(0.97);
        }
        .btn-primary:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-primary .shine {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1), transparent 60%);
            pointer-events: none;
            animation: shineFloat 5s ease-in-out infinite;
        }
        @keyframes shineFloat {
            0%,
            100% {
                transform: translate(-10%, -10%);
            }
            50% {
                transform: translate(10%, 10%);
            }
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
            padding: 8px 14px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 500;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.06);
            color: #fff;
            transform: translateY(-2px);
        }

        /* ═══════════════════════════════════════════════════════════════════
           SIM RECHARGE CARD
           ═══════════════════════════════════════════════════════════════════ */
        .sim-card {
            position: relative;
            width: 100%;
            aspect-ratio: 1.55 / 1;
            border-radius: var(--radius-md);
            background: linear-gradient(145deg, rgba(12, 16, 32, 0.92), rgba(4, 6, 14, 0.96));
            border: 1px solid rgba(255, 215, 0, 0.06);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.02);
            padding: 16px 14px;
            display: none;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            margin-top: 10px;
            transition: all 0.6s ease;
            transform-style: preserve-3d;
            perspective: 800px;
        }
        .sim-card.visible {
            display: flex;
        }
        .sim-card .sec-pattern {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(45deg, transparent, transparent 14px, rgba(255, 215, 0, 0.008) 14px,
                    rgba(255, 215, 0, 0.008) 16px);
            pointer-events: none;
            border-radius: var(--radius-md);
        }
        .sim-card .holo-bg {
            position: absolute;
            top: 10%;
            right: 5%;
            width: 50%;
            height: 55%;
            border-radius: 50%;
            filter: blur(50px);
            pointer-events: none;
            transition: all 1.2s ease;
            background: radial-gradient(circle at 30% 40%, var(--holo-color, rgba(255, 215, 0, 0.04)), transparent 70%);
        }
        .sim-card .top-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            position: relative;
            z-index: 1;
        }
        .sim-card .top-row .brand {
            font-size: 9px;
            letter-spacing: 0.2em;
            color: var(--text-tertiary);
            font-weight: 400;
            text-transform: uppercase;
        }
        .sim-card .top-row .chip-el {
            width: 30px;
            height: 22px;
            border-radius: 3px;
            background: linear-gradient(145deg, rgba(255, 215, 0, 0.04), rgba(255, 215, 0, 0.01));
            border: 1px solid rgba(255, 215, 0, 0.03);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sim-card .top-row .chip-el::after {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 1px;
            border: 1px solid rgba(255, 215, 0, 0.03);
        }
        .sim-card .number {
            font-family: var(--font);
            font-size: clamp(15px, 3vw, 22px);
            font-weight: 500;
            letter-spacing: 0.1em;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.01);
            position: relative;
            z-index: 1;
            margin: 1px 0;
            direction: ltr;
            text-align: left;
        }
        .sim-card .details {
            display: flex;
            gap: 16px;
            font-size: 8px;
            color: var(--text-tertiary);
            font-weight: 300;
            letter-spacing: 0.04em;
            position: relative;
            z-index: 1;
            flex-wrap: wrap;
        }
        .sim-card .details span {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }
        .sim-card .details strong {
            color: #fff;
            font-weight: 500;
            font-size: 10px;
        }
        .sim-card .data-icon {
            position: absolute;
            bottom: 10px;
            left: 12px;
            font-size: 16px;
            opacity: 0.06;
            z-index: 1;
        }
        .sim-card .engrave {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 6px;
            color: rgba(255, 255, 255, 0.02);
            letter-spacing: 0.12em;
            font-weight: 200;
            transform: rotate(-2deg);
            z-index: 1;
        }
        .sim-card .qr-sim {
            position: absolute;
            bottom: 10px;
            right: 50%;
            transform: translateX(50%);
            width: 30px;
            height: 30px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 1.5px;
            opacity: 0.06;
            z-index: 1;
        }
        .sim-card .qr-sim .dot {
            border-radius: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        .sim-card .qr-sim .dot.filled {
            background: rgba(255, 215, 0, 0.3);
        }
        .sim-card .operator-label {
            position: absolute;
            top: 12px;
            right: 50%;
            transform: translateX(50%);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: rgba(255, 215, 0, 0.12);
            z-index: 1;
            text-transform: uppercase;
        }

        /* ─── Card Actions ─── */
        .card-actions {
            display: none;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 10px;
        }
        .card-actions.visible {
            display: flex;
        }
        .card-actions .btn-sm {
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 400;
            font-family: var(--font);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .card-actions .btn-sm:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            transform: translateY(-2px);
        }
        .card-actions .btn-sm.gold {
            border-color: rgba(255, 215, 0, 0.1);
            color: #ffd700;
        }
        .card-actions .btn-sm.gold:hover {
            background: rgba(255, 215, 0, 0.05);

        /* ═══════════════════════════════════════════════════════════════════
           GENERATING OVERLAY
           ═══════════════════════════════════════════════════════════════════ */
        .gen-overlay {
            display: none;
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            background: rgba(4, 6, 14, 0.88);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 10;
            padding: 30px;
        }
        .gen-overlay.active {
            display: flex;
        }
        .gen-overlay .core {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.15), rgba(0, 0, 0, 0.1));
            border: 1px solid rgba(255, 215, 0, 0.04);
            box-shadow: 0 0 60px rgba(255, 215, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 200;
            animation: corePulse 1.5s ease-in-out infinite;
            color: #ffd700;
        }
        @keyframes corePulse {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 0 60px rgba(255, 215, 0, 0.06);
            }
            50% {
                transform: scale(1.1);
                box-shadow: 0 0 100px rgba(255, 215, 0, 0.12);
            }
        }
        .gen-overlay .status {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 300;
            letter-spacing: 0.08em;
            animation: statusPulse 2s ease-in-out infinite;
        }
        @keyframes statusPulse {
            0%,
            100% {
                opacity: 0.3;
            }
            50% {
                opacity: 1;
            }
        }
        .gen-overlay .progress {
            width: 130px;
            height: 2px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 2px;
            overflow: hidden;
        }
        .gen-overlay .progress .fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        // ─── Recharge Packages ───
        const PACKAGES = [
            { id: 'p1', value: '10', data: '2 GB', label: '$10', desc: '2 GB · 7 days' },
            { id: 'p2', value: '25', data: '6 GB', label: '$25', desc: '6 GB · 15 days' },

            { id: 'p4', value: '100', data: '40 GB', label: '$100', desc: '40 GB · 60 days' },
        ];

        /* ═══════════════════════════════════════════════════════════════════
           STATE
           ═══════════════════════════════════════════════════════════════════ */

        const state = {
            countryKey: null,
            country: null,
            operator: null,
            phone: '',
            package: null,
            cardData: null,
            isFlipped: false,
            rotation: 0,
            isGenerating: false,
            isValid: false,
        };

        /* ═══════════════════════════════════════════════════════════════════

           ═══════════════════════════════════════════════════════════════════ */

        const $ = id => document.getElementById(id);
        const countryGrid = $('countryGrid');
        const phoneInput = $('phoneInput');
        const phonePrefix = $('phonePrefix');
        const phonePageLabel = $('phonePageLabel');
        const phonePageTitle = $('phonePageTitle');
        const phoneCountrySub = $('phoneCountrySub');
        const statusIcon = $('statusIcon');

        const opName = $('opName');
        const opSub = $('opSub');

        const simData = $('simData');

        const simEngrave = $('simEngrave');
        const simDataIcon = $('simDataIcon');
        const simQR = $('simQR');
        const cardActions = $('cardActions');
        const genOverlay = $('genOverlay');
        const genCore = $('genCore');
        const genStatus = $('genStatus');

        /* ═══════════════════════════════════════════════════════════════════
           NAVIGATION
           ═══════════════════════════════════════════════════════════════════ */

        function goToCountry() {
            document.getElementById('pageCountry').classList.add('active');
            document.getElementById('pagePhone').classList.remove('active');
            simCard.classList.remove('visible');
            cardActions.classList.remove('visible');
            generateBtn.disabled = true;
            // Reset validation
            statusIcon.className = 'status-icon';
            validMsg.className = 'validation-msg';
            validMsg.textContent = 'أدخل رقم صحيح';
            operatorBadge.style.display = 'none';
            phoneInput.value = '';
            state.isValid = false;
            state.operator = null;
        }

        function goToPhone() {
            document.getElementById('pageCountry').classList.remove('active');
            document.getElementById('pagePhone').classList.add('active');
            phoneInput.focus();
        }

        /* ═══════════════════════════════════════════════════════════════════
           RENDER COUNTRIES
           ═══════════════════════════════════════════════════════════════════ */

        function renderCountries() {
            countryGrid.innerHTML = '';
            const keys = Object.keys(TELECOM_DATA);
            keys.forEach((key) => {
                const c = TELECOM_DATA[key];
                const btn = document.createElement('button');
                btn.className = 'btn btn-country';
                btn.style.setProperty('--btn-color', c.color);
                btn.innerHTML = `
              <span class="icon">${c.icon}</span>
              <span class="label">${key}</span>
              <span class="sub">${c.code}</span>
              <span class="bar"></span>
              <span class="dot-indicator"></span>
            `;
                btn.addEventListener('click', () => selectCountry(key));
                countryGrid.appendChild(btn);
            });
        }

        /* ═══════════════════════════════════════════════════════════════════
           SELECT COUNTRY
           ═══════════════════════════════════════════════════════════════════ */

        function selectCountry(key) {
            state.countryKey = key;
            state.country = TELECOM_DATA[key];

            // Update UI
            phonePrefix.textContent = state.country.code;
            phonePageLabel.textContent = state.countryKey;
            phonePageTitle.textContent = `أدخل رقم ${state.countryKey}`;
            phoneCountrySub.textContent = `${state.countryKey} · ${state.country.code}`;

            // Update glow
            glowAura.style.background =
                `radial-gradient(circle, ${state.country.color}33, transparent 70%)`;
            glowAura.style.opacity = '0.4';

            // Reset
            phoneInput.value = '';
            statusIcon.className = 'status-icon';
            validMsg.className = 'validation-msg';
            validMsg.textContent = 'أدخل رقم صحيح';
            operatorBadge.style.display = 'none';
            state.operator = null;
            state.isValid = false;
            generateBtn.disabled = true;
            simCard.classList.remove('visible');
            cardActions.classList.remove('visible');

            goToPhone();
        }

        /* ═══════════════════════════════════════════════════════════════════
           PHONE VALIDATION ENGINE — Smart Operator Detection
           ═══════════════════════════════════════════════════════════════════ */

        phoneInput.addEventListener('input', function(e) {
            let value = this.value.replace(/\s/g, '');
            value = value.replace(/\D/g, '');
            this.value = value;

            if (!state.country) return;

            // Find matching operator by prefix
            let matchedOp = null;
            const operators = state.country.operators;

            // Sort by prefix length descending (longest first)
            const sorted = [...operators].sort((a, b) => b.prefix.length - a.prefix.length);

            for (const op of sorted) {
                if (value.startsWith(op.prefix)) {
                    matchedOp = op;
                    break;
                }
            }

            const minLength = matchedOp ? matchedOp.prefix.length + 3 : 6;
            const hasLength = value.length >= minLength && value.length <= 15;

            if (matchedOp && hasLength) {
                // Valid!
                state.operator = matchedOp;
                state.isValid = true;
                state.phone = value;

                // Update UI
                statusIcon.className = 'status-icon valid';
                statusIcon.textContent = '✓';
                validMsg.className = 'validation-msg valid';
                validMsg.textContent = `✓ رقم صحيح لمشغل ${matchedOp.name}`;

                operatorBadge.style.display = 'flex';
                opDot.style.background = matchedOp.color;
                opName.textContent = matchedOp.name;
                opName.style.color = matchedOp.color;
                opSub.textContent = `${state.countryKey} · ${state.country.code}`;

                // Enable generate button
                generateBtn.disabled = false;
                generateBtn.textContent = '✦ إنشاء كارت الشحن';

                // Set colors
                const root = document.documentElement;
                root.style.setProperty('--btn-color', matchedOp.color);
                root.style.setProperty('--btn-glow', matchedOp.glow);
                glowAura.style.background =
                    `radial-gradient(circle, ${matchedOp.glow}, transparent 70%)`;
                glowAura.style.opacity = '0.5';

            } else if (value.length > 0) {
                // Invalid or incomplete
                state.isValid = false;
                state.operator = null;
                statusIcon.className = 'status-icon invalid';
                statusIcon.textContent = '✗';
                validMsg.className = 'validation-msg invalid';

                if (!matchedOp) {
                    const prefixes = operators.map(o => o.prefix).join(', ');
                    validMsg.textContent = `⚠️ يجب أن يبدأ بـ ${prefixes}`;
                } else {
                    validMsg.textContent = `⚠️ الرقم غير مكتمل (يحتاج ${minLength} أرقام على الأقل)`;
                }

                operatorBadge.style.display = 'none';
                generateBtn.disabled = true;
                generateBtn.textContent = '✦ أدخل رقم صحيح أولاً';

            } else {
                // Empty
                statusIcon.className = 'status-icon';
                statusIcon.textContent = '';
                validMsg.className = 'validation-msg';
                validMsg.textContent = 'أدخل رقم صحيح';
                operatorBadge.style.display = 'none';
                generateBtn.disabled = true;
                generateBtn.textContent = '✦ أدخل رقم صحيح أولاً';
                state.isValid = false;
                state.operator = null;
            }
        });

        /* ═══════════════════════════════════════════════════════════════════
           GENERATE CARD — Cinematic Creation
           ═══════════════════════════════════════════════════════════════════ */

        generateBtn.addEventListener('click', function() {
            if (!state.isValid || !state.operator || !state.country) return;
            generateCard();
        });

        function generateCard() {
            if (state.isGenerating) return;

            state.isGenerating = true;
            genOverlay.classList.add('active');
            genBar.style.width = '0%';

            const steps = [
                { progress: 12, status: 'جاري التحقق من الرقم' },
                { progress: 28, status: 'تجهيز بيانات المشغل' },
                { progress: 45, status: 'تصميم الكارت' },
                { progress: 62, status: 'تضمين الشريحة' },
                { progress: 80, status: 'تفعيل الهولوغرام' },
                { progress: 95, status: 'تشفير البيانات' },
                { progress: 100, status: 'الكارت جاهز ✦' },
            ];

            let stepIdx = 0;

            function advance() {
                if (stepIdx >= steps.length) {
                    finishCardGeneration();
                    return;
                }
                const s = steps[stepIdx];
                genStatus.textContent = s.status;
                genBar.style.width = s.progress + '%';
                genCore.style.transform = `scale(${1 + s.progress / 200})`;
                genCore.style.boxShadow =
                    `0 0 ${80 + s.progress}px ${state.operator.glow}`;
                stepIdx++;
                const delay = stepIdx < 4 ? 180 + Math.random() * 140 : 120 + Math.random() * 100;
                setTimeout(advance, delay);
            }

            advance();
        }

        function finishCardGeneration() {
            state.isGenerating = false;
            genOverlay.classList.remove('active');

            const card = buildCard();
            state.cardData = card;
            renderCard(card);

            simCard.classList.add('visible');
            cardActions.classList.add('visible');

            // Animate in
            simCard.style.opacity = '0';
            simCard.style.transform = 'scale(0.94) translateY(16px)';
            requestAnimationFrame(() => {
                simCard.style.transition = 'all 0.6s cubic-bezier(0.16,1,0.3,1)';
                simCard.style.opacity = '1';
                simCard.style.transform = 'scale(1) translateY(0)';
            });

            generateBtn.textContent = '✦ تم الإنشاء ✓';
            setTimeout(() => {
                if (!state.isGenerating) {
                    generateBtn.textContent = '✦ إنشاء كارت جديد';
                }
            }, 1500);
        }

        /* ═══════════════════════════════════════════════════════════════════
           BUILD CARD DATA
           ═══════════════════════════════════════════════════════════════════ */

        function buildCard() {
            const op = state.operator;
            const country = state.country;
            const pkg = PACKAGES[Math.floor(Math.random() * PACKAGES.length)];

            const now = new Date();
            const validUntil = new Date(now);
            validUntil.setFullYear(validUntil.getFullYear() + 1);

            // Generate 16-digit card number
            let cardNum = '';
            for (let i = 0; i < 16; i++) {
                cardNum += Math.floor(Math.random() * 10);
                if (i % 4 === 3 && i < 15) cardNum += ' ';
            }

            const serial = 'NX-' +
                String.fromCharCode(65 + Math.floor(Math.random() * 26)) +
                String.fromCharCode(65 + Math.floor(Math.random() * 26)) +
                '-' +
                String(Math.floor(10000 + Math.random() * 90000)) +
                '-' +
                String(Math.floor(1000 + Math.random() * 9000));

            const auth = String(Math.floor(1000 + Math.random() * 9000));
            const brandNames = ['NEXUS', 'TELECOM', 'GLOBAL', 'PREMIUM', 'SIGNATURE'];
            const brand = brandNames[Math.floor(Math.random() * brandNames.length)] + ' RECHARGE';

            return {
                number: cardNum,
                serial: serial,
                auth: auth,
                validUntil: validUntil.toLocaleDateString('en-US', { month: '2-digit', year: '2-digit' }),
                brand: brand,
                value: pkg.value,
                data: pkg.data,
                operator: op,
                country: country,
                package: pkg,
                phone: state.phone,
            };
        }

        /* ═══════════════════════════════════════════════════════════════════
           RENDER CARD
           ═══════════════════════════════════════════════════════════════════ */

        function renderCard(card) {
            const op = card.operator;
            const c1 = op.color;
            const c2 = op.color2;

            simBrand.textContent = card.brand;
            simNumber.textContent = card.number;
            simValid.textContent = card.validUntil;
            simCode.textContent = card.auth;
            simData.textContent = card.data;
            simValue.textContent = '$' + card.value;
            simEngrave.textContent = '∞ ' + card.serial;
            simOpLabel.textContent = op.name.toUpperCase();

            // Hologram
            const hue = Math.floor(Math.random() * 360);
            simHolo.style.background =
                `radial-gradient(circle at 30% 40%, hsla(${hue},80%,70%,0.05), transparent 70%)`;

            // Border
            simCard.style.borderColor = `${c1}44`;
            simCard.style.boxShadow =
                `0 20px 60px rgba(0,0,0,0.5), 0 0 40px ${op.glow}`;

            // Data icon
            const icons = ['📶', '📡', '📱', '🌐', '⚡', '🔷', '💠'];
            simDataIcon.textContent = icons[Math.floor(Math.random() * icons.length)];

            // QR pattern
            renderQR();

            // Reset flip/rotation
            state.isFlipped = false;
            state.rotation = 0;
            simCard.style.transform = 'rotateY(0deg)';
        }

        function renderQR() {
            simQR.innerHTML = '';
            const size = 5;
            for (let i = 0; i < size * size; i++) {
                const dot = document.createElement('span');
                dot.className = 'dot';
                if (Math.random() > 0.4) dot.classList.add('filled');
                simQR.appendChild(dot);
            }
        }

        /* ═══════════════════════════════════════════════════════════════════
           CARD INTERACTIONS
           ═══════════════════════════════════════════════════════════════════ */

        function generateNewCard() {
            if (state.country && state.operator && state.isValid) {
                generateCard();
            } else {
                goToCountry();
            }
        }

        function flipCard() {
            state.isFlipped = !state.isFlipped;
            const deg = state.isFlipped ? 180 : 0;
            simCard.style.transition = 'transform 0.7s cubic-bezier(0.16,1,0.3,1)';
            simCard.style.transform = `rotateY(${deg}deg)`;
            state.rotation = 0;
        }

        function rotateCard() {
            state.rotation += 360;
            const flip = state.isFlipped ? 180 : 0;
            simCard.style.transition = 'transform 1.2s cubic-bezier(0.16,1,0.3,1)';
            simCard.style.transform = `rotateY(${flip + state.rotation}deg)`;
        }

        function copyCard() {
            if (!state.cardData) return;
            const d = state.cardData;
            const text =
                `✦ NEXUS RECHARGE CARD ✦\n` +
                `Brand: ${d.brand}\n` +
                `Card: ${d.number}\n` +
                `Valid: ${d.validUntil}\n` +
                `Code: ${d.auth}\n` +
                `Value: $${d.value}\n` +
                `Data: ${d.data}\n` +
                `Serial: ${d.serial}\n` +
                `Operator: ${d.operator.name}\n` +
                `Country: ${d.country.countryKey}\n` +
                `Phone: ${d.phone}`;

            navigator.clipboard.writeText(text).then(() => {
                const btns = document.querySelectorAll('.card-actions .btn-sm');
                const btn = btns[btns.length - 1];
                const orig = btn.textContent;
                btn.textContent = '✓ تم النسخ';
                setTimeout(() => btn.textContent = orig, 1500);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
                const btns = document.querySelectorAll('.card-actions .btn-sm');
                const btn = btns[btns.length - 1];
                const orig = btn.textContent;
                btn.textContent = '✓ تم النسخ';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }

        /* ═══════════════════════════════════════════════════════════════════
           SURPRISE ME
           ═══════════════════════════════════════════════════════════════════ */

        function surpriseMe() {
            const keys = Object.keys(TELECOM_DATA);
            const randKey = keys[Math.floor(Math.random() * keys.length)];
            const country = TELECOM_DATA[randKey];
            const op = country.operators[Math.floor(Math.random() * country.operators.length)];

            // Generate a valid number
            let num = op.prefix;
            const remaining = 8 - op.prefix.length;
            for (let i = 0; i < remaining; i++) {
                num += Math.floor(Math.random() * 10);
            }
            // Pad if needed
            while (num.length < 10) num += Math.floor(Math.random() * 10);

            state.countryKey = randKey;
            state.country = country;
            state.operator = op;
            state.phone = num;
            state.isValid = true;

            // Update UI
            phonePrefix.textContent = country.code;
            phonePageLabel.textContent = randKey;
            phonePageTitle.textContent = `أدخل رقم ${randKey}`;
            phoneCountrySub.textContent = `${randKey} · ${country.code}`;

            // Set colors
            const root = document.documentElement;
            root.style.setProperty('--btn-color', op.color);
            root.style.setProperty('--btn-glow', op.glow);
            glowAura.style.background =
                `radial-gradient(circle, ${op.glow}, transparent 70%)`;
            glowAura.style.opacity = '0.5';

            // Show operator badge
            operatorBadge.style.display = 'flex';
            opDot.style.background = op.color;
            opName.textContent = op.name;
            opName.style.color = op.color;
            opSub.textContent = `${randKey} · ${country.code}`;

            // Set input
            phoneInput.value = num;
            statusIcon.className = 'status-icon valid';
            statusIcon.textContent = '✓';
            validMsg.className = 'validation-msg valid';
            validMsg.textContent = `✓ رقم صحيح لمشغل ${op.name}`;

            generateBtn.disabled = false;
            generateBtn.textContent = '✦ إنشاء كارت الشحن';

            // Show phone page
            document.getElementById('pageCountry').classList.remove('active');
            document.getElementById('pagePhone').classList.add('active');

            // Auto-generate
            setTimeout(() => {
                if (!generateBtn.disabled) {
                    generateCard();
                }
            }, 500);
        }

        /* ═══════════════════════════════════════════════════════════════════
           KEYBOARD SHORTCUTS
           ═══════════════════════════════════════════════════════════════════ */

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.activeElement === phoneInput) {
                if (!generateBtn.disabled) generateBtn.click();
            }
            if (e.key === 'g' && !e.ctrlKey && !e.metaKey) {
                if (!generateBtn.disabled) generateBtn.click();
            }
            if (e.key === 'r' && state.cardData) rotateCard();
            if (e.key === 'f' && state.cardData) flipCard();
            if (e.key === 'n' && state.cardData) generateNewCard();
            if (e.key === 'Escape') {
                if (genOverlay.classList.contains('active')) return;
                if (state.cardData) {
                    simCard.classList.remove('visible');
                    cardActions.classList.remove('visible');
                    goToCountry();
                }
            }
        });

        /* ═══════════════════════════════════════════════════════════════════
           INIT
           ═══════════════════════════════════════════════════════════════════ */

        renderCountries();

        console.log('✦ NEXUS Recharge Card Generator v3.0');
        console.log('✦ Smart operator detection enabled');
        console.log(`✦ ${Object.keys(TELECOM_DATA).length} countries loaded`);
        let totalOps = 0;
        Object.values(TELECOM_DATA).forEach(c => totalOps += c.operators.length);
